<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Health Jobs | Professional Chat & Call</title>
    <meta name="robots" content="noindex, nofollow">

    <style>
        /* 🚀 PROFESSIONAL THEME */
        :root {
            --primary-blue: #0a66c2; 
            --bg-body: #f8fafc; 
            --msg-me: #e0f2fe; 
            --msg-them: #ffffff; 
            --text-main: #0f172a;
            --tick-blue: #0ea5e9;
            --tick-gray: #94a3b8;
            --app-bg: #e2e8f0; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* 💻 PC VIEW (Centered App) */
        html, body { height: 100%; width: 100%; background-color: var(--app-bg); }
        body { display: flex; justify-content: center; align-items: center; margin: 0; overflow: hidden; }
        
        #app-container { 
            width: 100%; max-width: 450px; height: 100vh; height: 100dvh; 
            background-color: var(--bg-body); display: flex; flex-direction: column; 
            position: relative; box-shadow: 0 10px 40px rgba(0,0,0,0.2); overflow: hidden;
            border-radius: 12px;
        }

        /* 📱 MOBILE VIEW (Full Screen Native App Fit) */
        @media (max-width: 500px) {
            body { background-color: var(--bg-body); }
            #app-container { max-width: 100%; border-radius: 0; box-shadow: none; height: 100%; }
        }

        /* Header */
        header { flex: 0 0 65px; background-color: var(--primary-blue); padding: 0 15px; display: flex; align-items: center; color: white; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .back-btn { background: none; border: none; cursor: pointer; color: white; margin-right: 10px; display: flex;}
        .back-btn svg { width: 28px; height: 28px; fill: currentColor; }
        .chat-avatar { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; background: #fff; margin-right: 12px; border: 2px solid rgba(255,255,255,0.3);}
        .chat-name { font-size: 16.5px; font-weight: 700; letter-spacing: 0.3px;}
        .chat-status { font-size: 12px; opacity: 0.9;}
        
        /* Header Actions (Call Buttons) */
        .header-actions { margin-left: auto; display: flex; gap: 15px; align-items: center; }
        .header-actions button { background: none; border: none; color: white; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center;}
        .header-actions button:active { transform: scale(0.9); opacity: 0.7; }

        /* Chat Area */
        main#chat-area { 
            flex: 1 1 auto; overflow-y: auto; padding: 15px 12px; display: flex; flex-direction: column; gap: 8px; 
            background: var(--bg-body);
        }
        
        .msg-row { display: flex; width: 100%; margin-bottom: 4px; }
        .msg-row.me { justify-content: flex-end; }
        .msg-row.them { justify-content: flex-start; }

        .msg-bubble { max-width: 82%; padding: 8px 12px; border-radius: 14px; font-size: 15px; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.06); word-wrap: break-word; color: var(--text-main); display: flex; flex-direction: column; user-select: none; border: 1px solid #e2e8f0; line-height: 1.4;}
        .msg-bubble.active { filter: brightness(0.95); border-color: var(--primary-blue); }
        .msg-row.me .msg-bubble { background-color: var(--msg-me); border-top-right-radius: 4px; padding-right: 28px; border-color: #bae6fd;} 
        .msg-row.them .msg-bubble { background-color: var(--msg-them); border-top-left-radius: 4px; }

        /* Call Message Design */
        .call-msg-box { background: var(--primary-blue); color: white; padding: 10px 15px; border-radius: 8px; text-align: center; min-width: 180px; }
        .call-msg-box button { background: white; color: var(--primary-blue); border: none; padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 8px; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);}
        .call-msg-box button:active { background: #f1f5f9; }

        .deleted-msg { font-style: italic; color: #64748b; display: flex; align-items: center; gap: 6px; font-size: 14px; }

        /* 3 Dots Menu Icon */
        .msg-opts-btn { position: absolute; top: 4px; right: 4px; width: 22px; height: 22px; display: flex; justify-content: center; align-items: center; cursor: pointer; opacity: 0.4; font-size: 18px; font-weight: bold; border-radius: 50%; color: #475569; transition: 0.2s;}
        .msg-opts-btn:hover { background: rgba(0,0,0,0.08); opacity: 1; }

        /* Elements inside bubble */
        .reply-quote { background: rgba(255,255,255,0.7); border-left: 4px solid var(--primary-blue); padding: 8px 10px; border-radius: 6px; font-size: 13.5px; margin-bottom: 6px; color: #475569; border: 1px solid rgba(0,0,0,0.05);}
        .msg-media { max-width: 100%; border-radius: 10px; margin-bottom: 6px; cursor: pointer; max-height: 260px; object-fit: cover; border: 1px solid #e2e8f0;}
        .msg-audio { width: 220px; height: 40px; min-height: 40px; margin-bottom: 6px; outline: none; }

        .msg-meta { display: flex; justify-content: flex-end; align-items: center; gap: 4px; margin-top: 4px; align-self: flex-end; }
        .msg-time { font-size: 10.5px; color: #64748b; font-weight: 500;}
        .msg-edited { font-size: 10.5px; color: #64748b; font-style: italic; margin-right: 3px; }
        .msg-tick svg { width: 17px; height: 17px; fill: var(--tick-gray); }
        .msg-tick.read svg { fill: var(--tick-blue); }

        /* Bottom Input Area */
        .bottom-container { flex: 0 0 auto; background: #ffffff; border-top: 1px solid #e2e8f0; display: flex; flex-direction: column; z-index: 10; position: relative;}
        
        .preview-box { display: none; padding: 12px 15px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; position: relative; border-left: 4px solid var(--primary-blue); font-size: 14px;}
        .cancel-preview { position: absolute; top: 10px; right: 15px; background: none; border: none; font-size: 20px; cursor: pointer; color: #64748b; }
        
        .input-area { padding: 10px 12px; display: flex; align-items: flex-end; gap: 8px; position: relative;}
        .attach-btn { background: none; border: none; padding: 8px; cursor: pointer; color: #64748b; transition: 0.2s; border-radius: 50%;}
        .attach-btn:active { background: #f1f5f9; color: var(--primary-blue); }
        .attach-btn svg { width: 26px; height: 26px; fill: currentColor; transform: rotate(45deg); }
        .input-box { flex: 1; background: #f1f5f9; border-radius: 22px; padding: 12px 16px; border: 1px solid transparent; outline: none; font-size: 15.5px; max-height: 120px; overflow-y: auto; resize: none; transition: 0.2s;}
        .input-box:focus { border-color: var(--primary-blue); background: #fff; box-shadow: 0 0 0 3px rgba(10,102,194,0.1);}
        
        /* Voice Recording UI */
        .recording-ui { display: none; flex: 1; background: #fef2f2; border: 1px solid #fecaca; border-radius: 22px; padding: 12px 16px; align-items: center; justify-content: space-between; font-weight: bold; }
        .record-timer { color: #ef4444; animation: pulse 1.5s infinite; }
        .slide-cancel { font-size: 13.5px; color: #ef4444; font-weight: normal; animation: slideLeft 1.5s infinite alternate;}
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        @keyframes slideLeft { 0% { transform: translateX(0); } 100% { transform: translateX(-10px); } }

        .action-circle-btn { width: 44px; height: 44px; border-radius: 50%; border: none; display: flex; justify-content: center; align-items: center; color: white; cursor: pointer; flex-shrink: 0; box-shadow: 0 2px 6px rgba(0,0,0,0.15); transition: 0.2s;}
        .btn-send { background-color: var(--primary-blue); display: none; }
        .btn-mic { background-color: #0ea5e9; user-select: none; touch-action: none; }
        .btn-mic.recording { background-color: #ef4444; transform: scale(1.3); }

        /* Context Menu & Overlays */
        #context-menu { position: absolute; background: white; border-radius: 14px; box-shadow: 0 8px 25px rgba(0,0,0,0.15); display: none; z-index: 1000; overflow: hidden; width: 180px; border: 1px solid #e2e8f0;}
        .ctx-item { padding: 14px 20px; font-size: 15px; color: #1e293b; display: flex; align-items: center; gap: 12px; cursor: pointer; font-weight: 500; transition: 0.1s;}
        .ctx-item:active, .ctx-item:hover { background: #f8fafc; color: var(--primary-blue);}
        .ctx-item:not(:last-child) { border-bottom: 1px solid #f1f5f9; }

        .viewer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 4000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .viewer-close { position: absolute; top: 20px; right: 20px; color: white; font-size: 38px; background: none; border: none; cursor: pointer; z-index: 4001;}
        .download-btn { margin-top: 25px; padding: 14px 28px; background: var(--primary-blue); color: white; text-decoration: none; border-radius: 30px; font-weight: bold; font-size: 16px; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 12px rgba(10,102,194,0.4);}

        .modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.6); z-index: 3000; display: none; justify-content: center; align-items: center; flex-direction: column; }
        .modal-box { background: white; padding: 25px 20px; border-radius: 18px; width: 85%; max-width: 320px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .modal-btn { width: 100%; padding: 14px; margin-top: 10px; border: none; border-radius: 12px; font-size: 15.5px; font-weight: bold; cursor: pointer; transition: 0.2s;}
        .btn-del-me { background: #f1f5f9; color: #334155; }
        .btn-del-all { background: #fef2f2; color: #ef4444; border: 1px solid #fecaca;}
        .btn-cancel { background: white; border: 1px solid #cbd5e1; color: #333; margin-top: 15px;}
        
        .spinner { width: 45px; height: 45px; border: 4px solid #e2e8f0; border-top: 4px solid var(--primary-blue); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .hidden { display: none !important; }
        .double-tick path { d: path("M18 7l-1.41-1.41-6.34 6.34 1.41 1.41L18 7zm4.24-1.41L11.66 16.17 7.48 12l-1.41 1.41L11.66 19l12-12-1.42-1.41zM.41 13.41L6 19l1.41-1.41L1.83 12 .41 13.41z"); }
    </style>
</head>
<body>

<div id="app-container">
    <header>
        <button class="back-btn" onclick="location.href='chats-request.html'">
            <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"></path></svg>
        </button>
        <div class="chat-user-info" style="display:flex; align-items:center;">
            <img src="https://ui-avatars.com/api/?name=User" id="target-pic" class="chat-avatar">
            <div>
                <div id="target-name" class="chat-name">Loading...</div>
                <div class="chat-status" id="chat-status">Online</div>
            </div>
        </div>
        
        <div class="header-actions">
            <button onclick="startZegoCall('audio', true)" title="Audio Call">
                <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
            </button>
            <button onclick="startZegoCall('video', true)" title="Video Call">
                <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
            </button>
        </div>
    </header>

    <main id="chat-area" onclick="closeMenu()"></main>

    <div class="bottom-container">
        <div class="preview-box" id="action-preview">
            <div style="font-weight: bold; color: var(--primary-blue);" id="preview-title">Replying to...</div>
            <div id="preview-text" style="color: #475569; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 90%; margin-top:4px;"></div>
            <button class="cancel-preview" onclick="cancelAction()">×</button>
        </div>

        <div class="input-area">
            <button class="attach-btn" id="attach-btn" onclick="document.getElementById('file-input').click()">
                <svg viewBox="0 0 24 24"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5a2.5 2.5 0 015 0v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5a2.5 2.5 0 005 0V5c0-3.31-2.69-6-6-6S3 1.69 3 5v11.5c0 3.86 3.14 7 7 7s7-3.14 7-7V6h-1.5z"/></svg>
            </button>
            <input type="file" id="file-input" accept="image/*,video/*" class="hidden" onchange="handleFileSelect(event)">
            
            <textarea id="msg-input" class="input-box" placeholder="Write a message..." rows="1" oninput="toggleSendBtn()"></textarea>
            
            <div id="recording-ui" class="recording-ui">
                <span id="record-timer" class="record-timer">🔴 00:00</span>
                <span class="slide-cancel">Slide to cancel 👈</span>
            </div>

            <button id="mic-btn" class="action-circle-btn btn-mic">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.39-.9.88 0 2.76-2.24 5-5 5s-5-2.24-5-5c0-.49-.41-.88-.9-.88s-.9.39-.9.88c0 3.38 2.51 6.18 5.8 6.72V22h2v-3.32c3.29-.54 5.8-3.34 5.8-6.72 0-.49-.41-.88-.9-.88z"/></svg>
            </button>
            
            <button id="send-btn" class="action-circle-btn btn-send" onclick="sendMessage()">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>

    <div id="context-menu"></div>

    <div id="delete-modal" class="modal-overlay">
        <div class="modal-box">
            <h3 style="margin-bottom:15px; color:#0f172a;">Delete Message?</h3>
            <button class="modal-btn btn-del-me" onclick="executeDelete('me')">Delete for me</button>
            <button class="modal-btn btn-del-all" id="btn-del-all" onclick="executeDelete('everyone')">Delete for everyone</button>
            <button class="modal-btn btn-cancel" onclick="closeDeleteModal()">Cancel</button>
        </div>
    </div>

    <div id="media-viewer" class="viewer">
        <button class="viewer-close" onclick="closeViewer()">×</button>
        <div id="viewer-content-box" style="display:flex; flex-direction:column; align-items:center;"></div>
    </div>

    <div id="upload-loader" class="modal-overlay" style="background: rgba(255,255,255,0.85);">
        <div class="spinner"></div>
        <div style="margin-top:15px; font-weight:700; color:var(--primary-blue);" id="loader-text">Processing...</div>
    </div>
</div>

<script src="https://unpkg.com/zego-zim-web/index.js"></script>
<script src="https://unpkg.com/@zegocloud/zego-uikit-prebuilt/zego-uikit-prebuilt.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getDatabase, ref as dbRef, push, set, update, onChildAdded, onChildChanged, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // Configurations
    const CLOUD_NAME = "dr06qkbaa"; 
    const UPLOAD_PRESET = "nearjobs_profiles"; 
    const mainConfig = { apiKey: "AIzaSyD4Cfni7D2Kk_t6qeZ4jcWesIabnSM15mk", authDomain: "jobs-45cc9.firebaseapp.com", projectId: "jobs-45cc9" };
    const chatConfig = { apiKey: "AIzaSyASgMlWAUfFFOl-pApiUEB__XAHzlo-9iI", authDomain: "chat-jobs.firebaseapp.com", databaseURL: "https://chat-jobs-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "chat-jobs" };

    const mainApp = initializeApp(mainConfig);
    const chatApp = initializeApp(chatConfig, "ChatApp");
    const auth = getAuth(mainApp);
    const dbMain = getFirestore(mainApp);
    const dbChatRT = getDatabase(chatApp); 

    let currentUser = null, targetUid = new URLSearchParams(window.location.search).get('uid'), chatId = null;
    let selectedFile = null, actionType = null, actionData = null, longPressTimer = null, activeMsgId = null;
    
    let zp = null; // ZegoCloud instance variable

    window.chatMessages = {}; 

    // Mobile Push Notifications Setup (Capacitor)
    async function setupPushNotifications() {
        if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.PushNotifications) {
            const PushNotifications = window.Capacitor.Plugins.PushNotifications;
            try {
                let permStatus = await PushNotifications.checkPermissions();

                if (permStatus.receive === 'prompt') {
                    permStatus = await PushNotifications.requestPermissions();
                }

                if (permStatus.receive !== 'granted') {
                    console.warn('Push notification permission denied by user.');
                } else {
                    await PushNotifications.register();
                    console.log("Push notifications system is active!");
                }
            } catch (error) {
                console.error("Push Notification Error: ", error);
            }
        } else {
            console.log("Not running on mobile app or Push plugin missing (Normal for web browser testing).");
        }
    }

    // ZegoCloud Initialization Function (Ringing Screen Setup)
    function initZegoCloud() {
        const appID = 349685482;
        const serverSecret = "2fda23cba27417a8e245c163c7536a13";
        const userID = currentUser.uid;
        const userName = currentUser.email ? currentUser.email.split('@')[0] : "User";

        const kitToken = ZegoUIKitPrebuilt.generateKitTokenForTest(appID, serverSecret, null, userID, userName);
        zp = ZegoUIKitPrebuilt.create(kitToken);

        zp.addCallInvitation({
            calleeIDs: [], 
            ringtoneConfig: {
                incomingCallUrl: '', // Add your mp3 link here later
                outgoingCallUrl: ''
            }
        });
    }

    onAuthStateChanged(auth, async (user) => {
        if (!user) return location.href = 'login.html';
        currentUser = user;
        if (!targetUid) return location.href = 'chats-request.html';
        chatId = currentUser.uid < targetUid ? `${currentUser.uid}_${targetUid}` : `${targetUid}_${currentUser.uid}`;
        
        setupPushNotifications(); // 👈 Ask for Notification Permission (For APK)
        initZegoCloud();          // 👈 Initialize Ringing system
        
        loadTargetUser();
        listenToRTDB();      
    });

    async function loadTargetUser() {
        try {
            const snap = await getDoc(doc(dbMain, "users", targetUid));
            if(snap.exists()){
                const u = snap.data();
                document.getElementById('target-name').innerText = u.facilityName || u.fullName || "User";
                document.getElementById('target-pic').src = u.profilePicUrl || `https://ui-avatars.com/api/?name=${u.fullName || "User"}`;
            }
        } catch(e) {}
    }

    function listenToRTDB() {
        const messagesRef = dbRef(dbChatRT, `chats/${chatId}/messages`);
        onChildAdded(messagesRef, (snapshot) => { processMsg(snapshot.key, snapshot.val()); });
        onChildChanged(messagesRef, (snapshot) => { processMsg(snapshot.key, snapshot.val()); });
    }

    function processMsg(id, msg) {
        window.chatMessages[id] = msg;
        if (msg[`deletedFor_${currentUser.uid}`]) {
            let el = document.getElementById(`msg-${id}`);
            if(el) el.remove();
            return;
        }
        renderMessage(msg, id);
        
        if (msg.senderId !== currentUser.uid && msg.status !== 'read' && !msg.isDeletedEveryone) {
            update(dbRef(dbChatRT, `chats/${chatId}/messages/${id}`), { status: 'read' });
        }
    }

    function renderMessage(msg, id) {
        const isMe = msg.senderId === currentUser.uid;
        let timeStr = new Date(msg.timestamp || Date.now()).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        
        let innerHTML = "";

        if (msg.isDeletedEveryone) {
            innerHTML = `<div class="msg-bubble" id="bubble-${id}"><div class="deleted-msg">🚫 This message was deleted</div><div class="msg-meta"><span class="msg-time">${timeStr}</span></div></div>`;
        } else if (msg.isCall) {
            // 📞 CALL MESSAGE RENDER (For Chat History)
            const callTitle = msg.callType === 'video' ? '🎥 Video Call' : '📞 Audio Call';
            innerHTML = `<div class="msg-bubble" id="bubble-${id}" style="background:transparent; border:none; box-shadow:none; padding:0;">
                <div class="call-msg-box">
                    <div>${callTitle}</div>
                    <button onclick="startZegoCall('${msg.callType}', false)">Call Back</button>
                    <div style="font-size:10px; margin-top:5px; opacity:0.8; text-align:right;">${timeStr}</div>
                </div>
            </div>`;
        } else {
            let mediaHtml = "", replyHtml = "";
            if(msg.mediaUrl) {
                if(msg.mediaType === 'audio') mediaHtml = `<audio src="${msg.mediaUrl}" class="msg-audio" controls></audio>`;
                else if(msg.mediaType === 'video') mediaHtml = `<video src="${msg.mediaUrl}" class="msg-media" onclick="openMediaViewer('${msg.mediaUrl}', 'video')"></video>`;
                else mediaHtml = `<img src="${msg.mediaUrl}" class="msg-media" onclick="openMediaViewer('${msg.mediaUrl}', 'image')">`;
            }
            if(msg.replyText) replyHtml = `<div class="reply-quote">${msg.replyText}</div>`;

            const tickHtml = isMe ? `<span class="msg-tick ${msg.status==='read'?'read':''} double-tick"><svg viewBox="0 0 24 24"><path d="M18 7l-1.41-1.41-6.34 6.34 1.41 1.41L18 7zm4.24-1.41L11.66 16.17 7.48 12l-1.41 1.41L11.66 19l12-12-1.42-1.41zM.41 13.41L6 19l1.41-1.41L1.83 12 .41 13.41z"/></svg></span>` : "";
            const editHtml = msg.isEdited ? `<span class="msg-edited">(edited)</span>` : "";
            const optsBtn = isMe ? `<div class="msg-opts-btn" onclick="openMenu(event, '${id}')">⋮</div>` : '';

            innerHTML = `<div class="msg-bubble" id="bubble-${id}">
                ${optsBtn}
                ${replyHtml}${mediaHtml}
                ${msg.text ? `<div>${msg.text}</div>` : ''}
                <div class="msg-meta">${editHtml}<span class="msg-time">${timeStr}</span>${tickHtml}</div>
            </div>`;
        }

        let existingDiv = document.getElementById(`msg-${id}`);
        if (existingDiv) {
            existingDiv.innerHTML = innerHTML;
        } else {
            const div = document.createElement('div'); div.id = `msg-${id}`; div.className = `msg-row ${isMe ? 'me' : 'them'}`; 
            div.innerHTML = innerHTML;
            document.getElementById('chat-area').appendChild(div);
            setTimeout(() => { document.getElementById('chat-area').scrollTop = document.getElementById('chat-area').scrollHeight; }, 50);
        }

        // Long press context menu
        if (!isMe && !msg.isDeletedEveryone && !msg.isCall) {
            const bubble = document.getElementById(`bubble-${id}`);
            bubble.addEventListener('touchstart', (e) => { longPressTimer = setTimeout(() => openMenu(e, id), 500); });
            bubble.addEventListener('touchend', () => clearTimeout(longPressTimer));
            bubble.addEventListener('touchmove', () => clearTimeout(longPressTimer));
            bubble.addEventListener('contextmenu', (e) => { e.preventDefault(); openMenu(e, id); });
        }
    }

    // 📞 ================= ZEGOCLOUD CALL INVITATION SYSTEM ================= 📞
    window.startZegoCall = async (type, isInitiator = false) => {
        if(!zp) { alert("Call system is initializing, please wait a moment..."); return; }

        const targetUserName = document.getElementById('target-name').innerText;

        zp.sendCallInvitation({
            callees: [{ userID: targetUid, userName: targetUserName }],
            callType: type === 'video' ? ZegoUIKitPrebuilt.InvitationTypeVideoCall : ZegoUIKitPrebuilt.InvitationTypeVoiceCall,
            timeout: 60, // Rings for 60 seconds
        }).then(async (res) => {
            console.log("Call Invitation Sent successfully", res);
            
            // Push message to chat history
            if (isInitiator) {
                let msgPayload = { 
                    senderId: currentUser.uid, 
                    status: 'sent', 
                    timestamp: serverTimestamp(), 
                    isCall: true, 
                    callType: type,
                    text: type === 'video' ? '🎥 Video Call Started' : '📞 Audio Call Started'
                };
                await set(push(dbRef(dbChatRT, `chats/${chatId}/messages`)), msgPayload);
                await update(dbRef(dbChatRT, `chatRooms/${chatId}`), {
                    participants: [currentUser.uid, targetUid], 
                    lastMessage: type === 'video' ? '🎥 Video Call' : '📞 Audio Call',
                    lastSenderId: currentUser.uid, 
                    readBy: [currentUser.uid], 
                    updatedAt: serverTimestamp()
                });
            }
        }).catch((err) => {
            console.error("Call Failed to send", err);
        });
    };

    // --- CONTEXT MENU & ACTIONS ---
    window.openMenu = (e, id) => {
        e.preventDefault(); e.stopPropagation();
        if ("vibrate" in navigator) navigator.vibrate(50); 
        closeMenu(); 
        activeMsgId = id;
        const msg = window.chatMessages[id];
        const isMe = msg.senderId === currentUser.uid;
        
        const menu = document.getElementById('context-menu');
        let html = `<div class="ctx-item" onclick="prepareAction('reply', '${id}')">↩️ Reply</div>`;
        html += `<div class="ctx-item" onclick="prepareAction('forward', '${id}')">↪️ Forward</div>`;
        if(isMe && msg.text && !msg.mediaUrl && !msg.isCall) html += `<div class="ctx-item" onclick="prepareAction('edit', '${id}')">✏️ Edit</div>`;
        html += `<div class="ctx-item" style="color:red;" onclick="showDeleteModal('${id}', ${isMe})">🗑️ Delete</div>`;
        menu.innerHTML = html;

        const appRect = document.getElementById('app-container').getBoundingClientRect();
        let posX = (e.touches ? e.touches[0].clientX : e.clientX) - appRect.left; 
        let posY = (e.touches ? e.touches[0].clientY : e.clientY) - appRect.top;

        menu.style.left = `${Math.min(posX, appRect.width - 190)}px`; 
        menu.style.top = `${Math.min(posY, appRect.height - 230)}px`;
        menu.style.display = 'block'; 
        document.getElementById(`bubble-${id}`).classList.add('active');
    };

    window.closeMenu = () => {
        document.getElementById('context-menu').style.display = 'none';
        if(activeMsgId) { let el = document.getElementById(`bubble-${activeMsgId}`); if(el) el.classList.remove('active'); }
    };

    window.prepareAction = (type, id) => {
        closeMenu();
        const msg = window.chatMessages[id];
        actionType = type;
        actionData = { id: id, text: msg.text || (msg.mediaType === 'audio' ? 'Voice Message' : 'Media Attachment') };

        if(type === 'forward') {
            document.getElementById('msg-input').value = actionData.text;
            window.toggleSendBtn();
            actionType = null;
            alert("Ready to forward. You can edit text before sending.");
            return;
        }

        document.getElementById('action-preview').style.display = 'block';
        document.getElementById('preview-title').innerText = type === 'edit' ? "✏️ Edit Message" : "↩️ Replying to...";
        document.getElementById('preview-text').innerText = actionData.text;
        
        if(type === 'edit') document.getElementById('msg-input').value = actionData.text;
        document.getElementById('msg-input').focus();
        window.toggleSendBtn();
    };

    window.cancelAction = () => {
        actionType = null; actionData = null; selectedFile = null;
        document.getElementById('action-preview').style.display = 'none';
        if(actionType === 'edit') document.getElementById('msg-input').value = "";
        window.toggleSendBtn();
    };

    window.handleFileSelect = (e) => {
        const file = e.target.files[0];
        if(file) {
            if (file.size > 10 * 1024 * 1024) {
                alert("File is too large! Maximum allowed size is 10MB.");
                e.target.value = "";
                return;
            }
            selectedFile = file;
            document.getElementById('action-preview').style.display = 'block';
            document.getElementById('preview-title').innerText = "📎 Attachment Ready";
            document.getElementById('preview-text').innerText = selectedFile.name;
            window.toggleSendBtn();
        }
    };

    window.toggleSendBtn = () => {
        const val = document.getElementById('msg-input').value.trim();
        document.getElementById('mic-btn').style.display = (val || selectedFile) ? 'none' : 'flex';
        document.getElementById('send-btn').style.display = (val || selectedFile) ? 'flex' : 'none';
    };

    // --- SEND TEXT & MEDIA ---
    window.sendMessage = async () => {
        const text = document.getElementById('msg-input').value.trim();
        if(!text && !selectedFile) return;

        if(actionType === 'edit' && actionData && !selectedFile) {
            await update(dbRef(dbChatRT, `chats/${chatId}/messages/${actionData.id}`), { text: text, isEdited: true });
            document.getElementById('msg-input').value = ""; cancelAction(); return;
        }

        let mediaUrl = null, mediaType = null;
        if(selectedFile) {
            document.getElementById('upload-loader').style.display = 'flex';
            document.getElementById('loader-text').innerText = "Sending Media...";
            mediaType = selectedFile.type.startsWith('video') ? 'video' : 'image';
            const formData = new FormData(); formData.append('file', selectedFile); formData.append('upload_preset', UPLOAD_PRESET);
            try {
                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`, { method: 'POST', body: formData });
                const data = await res.json();
                mediaUrl = data.secure_url;
            } catch(e) { alert("Upload failed."); document.getElementById('upload-loader').style.display='none'; return; }
        }

        let msgPayload = { senderId: currentUser.uid, status: 'sent', timestamp: serverTimestamp() };
        if(text) msgPayload.text = text;
        if(mediaUrl) { msgPayload.mediaUrl = mediaUrl; msgPayload.mediaType = mediaType; }
        if(actionType === 'reply' && actionData) msgPayload.replyText = actionData.text;

        document.getElementById('msg-input').value = "";
        document.getElementById('upload-loader').style.display = 'none';
        cancelAction();

        await set(push(dbRef(dbChatRT, `chats/${chatId}/messages`)), msgPayload);
        await update(dbRef(dbChatRT, `chatRooms/${chatId}`), {
            participants: [currentUser.uid, targetUid], lastMessage: text || (mediaType === 'video' ? '🎥 Video' : '📷 Photo'),
            lastSenderId: currentUser.uid, readBy: [currentUser.uid], updatedAt: serverTimestamp()
        });
    };

    // --- VOICE RECORDING SYSTEM ---
    let mediaRecorder = null, audioChunks = [], recordInterval = null, recordSeconds = 0, isRecording = false, isRecordingCancelled = false, currentMicStream = null;
    const micBtn = document.getElementById('mic-btn');

    const startRecording = async (e) => {
        if (e) e.preventDefault(); if (isRecording) return;
        isRecordingCancelled = false;
        if ("vibrate" in navigator) navigator.vibrate(50); 
        try {
            currentMicStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            let mimeType = 'audio/webm';
            if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) mimeType = 'audio/webm;codecs=opus';
            else if (MediaRecorder.isTypeSupported('audio/mp4')) mimeType = 'audio/mp4';

            mediaRecorder = new MediaRecorder(currentMicStream, { mimeType: mimeType });
            audioChunks = [];
            mediaRecorder.ondataavailable = e => { if (e.data && e.data.size > 0) audioChunks.push(e.data); };
            
            mediaRecorder.onstop = async () => {
                if (currentMicStream) currentMicStream.getTracks().forEach(track => track.stop());
                if (audioChunks.length > 0 && !isRecordingCancelled) {
                    await new Promise(r => setTimeout(r, 100));
                    const audioBlob = new Blob(audioChunks, { type: mimeType });
                    await sendVoiceMessage(audioBlob, mimeType);
                }
                isRecording = false; resetRecordingUI();
            };

            mediaRecorder.start(200); isRecording = true;
            micBtn.classList.add('recording');
            document.getElementById('msg-input').style.display = 'none';
            document.getElementById('attach-btn').style.display = 'none';
            document.getElementById('recording-ui').style.display = 'flex';
            
            recordSeconds = 0;
            document.getElementById('record-timer').innerText = `🔴 00:00`;
            recordInterval = setInterval(() => {
                recordSeconds++;
                document.getElementById('record-timer').innerText = `🔴 ${String(Math.floor(recordSeconds/60)).padStart(2,'0')}:${String(recordSeconds%60).padStart(2,'0')}`;
            }, 1000);
        } catch (err) { alert("Microphone permission required."); }
    };

    const stopAndSendRecording = (e) => { if (e) e.preventDefault(); if (mediaRecorder && isRecording && !isRecordingCancelled) mediaRecorder.stop(); };
    const cancelRecordingAction = (e) => {
        if (e) e.preventDefault();
        if (mediaRecorder && isRecording) { isRecordingCancelled = true; mediaRecorder.stop(); if ("vibrate" in navigator) navigator.vibrate([50, 50]); }
    };

    micBtn.addEventListener('mousedown', startRecording);
    micBtn.addEventListener('touchstart', startRecording, {passive: false});
    micBtn.addEventListener('mouseup', stopAndSendRecording);
    micBtn.addEventListener('touchend', stopAndSendRecording);
    micBtn.addEventListener('mouseleave', cancelRecordingAction);
    micBtn.addEventListener('touchcancel', cancelRecordingAction);
    micBtn.addEventListener('touchmove', (e) => {
        if (!isRecording) return;
        const touch = e.touches[0]; const btnRect = micBtn.getBoundingClientRect();
        if (touch.clientX < btnRect.left - 30 || touch.clientY < btnRect.top - 30) cancelRecordingAction(e);
    });

    function resetRecordingUI() {
        clearInterval(recordInterval);
        micBtn.classList.remove('recording');
        document.getElementById('msg-input').style.display = 'block';
        document.getElementById('attach-btn').style.display = 'block';
        document.getElementById('recording-ui').style.display = 'none';
    }

    async function sendVoiceMessage(audioBlob, mimeType) {
        document.getElementById('upload-loader').style.display = 'flex';
        document.getElementById('loader-text').innerText = "Sending Voice...";
        let ext = mimeType.includes('mp4') || mimeType.includes('m4a') ? 'mp4' : 'webm';
        
        const formData = new FormData();
        formData.append('file', new File([audioBlob], `voice_${Date.now()}.${ext}`, { type: mimeType })); 
        formData.append('upload_preset', UPLOAD_PRESET);
        formData.append('resource_type', 'video'); 
        
        try {
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, { method: 'POST', body: formData });
            const data = await res.json();
            
            let msgPayload = { senderId: currentUser.uid, status: 'sent', timestamp: serverTimestamp(), mediaUrl: data.secure_url, mediaType: 'audio' };
            if(actionType === 'reply' && actionData) msgPayload.replyText = actionData.text;

            await set(push(dbRef(dbChatRT, `chats/${chatId}/messages`)), msgPayload);
            await update(dbRef(dbChatRT, `chatRooms/${chatId}`), {
                participants: [currentUser.uid, targetUid], lastMessage: '🎤 Voice Message',
                lastSenderId: currentUser.uid, readBy: [currentUser.uid], updatedAt: serverTimestamp()
            });
            cancelAction();
        } catch(e) { alert("Voice upload failed."); }
        document.getElementById('upload-loader').style.display = 'none';
    }

    // 🚀 MEDIA VIEWER & DOWNLOADER
    window.openMediaViewer = (url, type) => {
        let content = type === 'video' 
            ? `<video src="${url}" controls autoplay style="max-width:95%; max-height:75vh; border-radius:8px;"></video>` 
            : `<img src="${url}" style="max-width:95%; max-height:75vh; border-radius:8px;">`;
        
        let downloadBtn = `<a href="${url}" download="media" target="_blank" class="download-btn">
            <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
            Download File</a>`;
            
        document.getElementById('viewer-content-box').innerHTML = content + downloadBtn;
        document.getElementById('media-viewer').style.display = 'flex';
    };
    window.closeViewer = () => { document.getElementById('media-viewer').style.display = 'none'; document.getElementById('viewer-content-box').innerHTML = ''; };

    // --- DELETE LOGIC ---
    let deleteTargetId = null;
    window.showDeleteModal = (id, isMe) => {
        closeMenu(); deleteTargetId = id;
        document.getElementById('delete-modal').style.display = 'flex';
        document.getElementById('btn-del-all').style.display = isMe ? 'block' : 'none'; 
    };
    window.closeDeleteModal = () => { document.getElementById('delete-modal').style.display = 'none'; };

    window.executeDelete = async (type) => {
        if(!deleteTargetId) return;
        const id = deleteTargetId; closeDeleteModal();
        if (type === 'me') {
            await update(dbRef(dbChatRT, `chats/${chatId}/messages/${id}`), { [`deletedFor_${currentUser.uid}`]: true });
            document.getElementById(`msg-${id}`)?.remove();
        } else if (type === 'everyone') {
            await update(dbRef(dbChatRT, `chats/${chatId}/messages/${id}`), { isDeletedEveryone: true, text: null, mediaUrl: null, replyText: null, isCall: null });
        }
    };
</script>
</body>
</html>
