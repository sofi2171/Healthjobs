<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="page-title">Post Details | Health Jobs Portal</title>
    
    <meta id="meta-desc" name="description" content="Click to view details, images, and documents of this healthcare opportunity.">
    <link id="canonical-url" rel="canonical" href="https://healthjobs-portal.web.app/details.html" />
    <meta property="og:type" content="article">
    <meta id="og-title" property="og:title" content="Health Jobs | Professional Post Details">
    <meta id="og-desc" property="og:description" content="Click to view details, images, and documents of this healthcare opportunity.">
    <meta id="og-image" property="og:image" content="https://healthjobs-portal.web.app/images/logo.png">
    <meta id="og-url" property="og:url" content="https://healthjobs-portal.web.app/details.html">
    <meta property="og:site_name" content="Health Jobs Portal">

    <script id="schema-markup" type="application/ld+json"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <style>
    /* Report Button & Popup */
.report-btn-wrap { padding: 15px; text-align: center; }
.report-btn { background: none; border: 1px solid #e2e8f0; color: #94a3b8; padding: 8px 20px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; transition: 0.2s; }
.report-btn:hover { border-color: #ef4444; color: #ef4444; background: #fff5f5; }

.report-popup { position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%); width: calc(100% - 30px); max-width: 480px; background: white; border-radius: 14px; border: 1px solid #e2e8f0; box-shadow: 0 8px 30px rgba(0,0,0,0.15); z-index: 9999; padding: 18px; display: none; animation: slideUp 0.3s ease; }
.report-popup.show { display: block; }
@keyframes slideUp { from { opacity:0; transform: translateX(-50%) translateY(20px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
.report-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.report-top h3 { font-size: 15px; font-weight: 700; color: #0f172a; }
.report-close { background: #f1f5f9; border: none; border-radius: 50%; width: 28px; height: 28px; font-size: 16px; cursor: pointer; color: #64748b; display: flex; align-items: center; justify-content: center; }
.report-owner-box { display: flex; align-items: center; gap: 10px; background: #f8fafc; padding: 10px 12px; border-radius: 10px; border: 1px solid #e2e8f0; margin-bottom: 14px; }
.report-owner-box img { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; border: 1px solid #e2e8f0; }
.report-reasons { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
.reason-chip { padding: 7px 13px; border-radius: 20px; border: 1px solid #e2e8f0; font-size: 12px; font-weight: 600; cursor: pointer; background: #f8fafc; color: #334155; transition: 0.2s; }
.reason-chip.selected { background: #0a66c2; color: white; border-color: #0a66c2; }
.report-input { width: 100%; padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 13px; margin-bottom: 10px; outline: none; font-family: inherit; }
.report-input:focus { border-color: #0a66c2; }
.report-submit { width: 100%; padding: 11px; background: #ef4444; color: white; border: none; border-radius: 20px; font-size: 14px; font-weight: 700; cursor: pointer; transition: 0.2s; }
.report-submit:hover { background: #dc2626; }
.report-success { text-align: center; padding: 10px 0; font-size: 14px; color: #16a34a; font-weight: 600; display: none; }
        :root {
            --primary-blue: #0a66c2;
            --hover-blue: #004182;
            --bg-white: #ffffff;
            --bg-body: #f3f2ef;
            --text-main: #000000e6;
            --text-secondary: #00000099;
            --border-color: #e0dfdc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        
        body { background-color: var(--bg-body); color: var(--text-main); padding-top: 60px; padding-bottom: 70px; min-height: 100vh; display: flex; flex-direction: column;}
        main { flex: 1; max-width: 600px; width: 100%; margin: 0 auto; background: var(--bg-white); box-shadow: 0 1px 4px rgba(0,0,0,0.08); min-height: 100vh;}

        /* Header */
        header { background-color: var(--bg-white); padding: 0 15px; display: flex; align-items: center; position: fixed; top: 0; left: 0; width: 100%; height: 60px; z-index: 1000; border-bottom: 1px solid var(--border-color); box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .back-btn { background: none; border: none; cursor: pointer; display: flex; align-items: center; color: var(--text-secondary); padding: 8px; border-radius: 50%; margin-right: 10px; transition: 0.2s;}
        .back-btn:hover { background-color: #f3f4f6; color: var(--primary-blue); }
        .back-btn svg { width: 26px; height: 26px; fill: currentColor; }
        .header-title { font-size: 18px; font-weight: 700; color: var(--text-main); }

        /* Post Content */
        .post-container { padding: 20px 15px; border-bottom: 1px solid var(--border-color); }
        .post-header { display: flex; align-items: center; margin-bottom: 15px; cursor: pointer; text-decoration: none;}
        .post-avatar { width: 50px; height: 50px; border-radius: 50%; margin-right: 12px; border: 1px solid #eee; object-fit: cover; background: #e0e0e0; }
        .user-name { font-size: 16px; font-weight: 700; color: var(--text-main); }
        .post-loc-info { font-size: 12.5px; color: var(--text-secondary); font-weight: 500; margin-top: 2px;}

        .post-title { font-size: 20px; font-weight: 800; color: var(--primary-blue); margin-bottom: 10px; line-height: 1.3;}
        .post-desc { font-size: 15.5px; line-height: 1.6; color: #191919; white-space: pre-wrap; margin-bottom: 15px; word-break: break-word;}

        /* Media Display */
        .all-media-container { display: flex; flex-direction: column; gap: 15px; margin-bottom: 15px; }
        .media-wrapper { position: relative; background: #f8f9fa; border-radius: 8px; overflow: hidden; border: 1px solid var(--border-color); display: flex; justify-content: center; align-items: center;}
        .media-item { width: 100%; max-height: 500px; object-fit: contain; cursor: pointer; display: block; background: #000;}

        /* Document Box UI */
        .doc-box { padding: 15px; background: #fff5f5; border: 1px solid #fed7d7; border-radius: 8px; display: flex; flex-direction: column; gap: 12px; }
        .doc-box-inner { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .doc-icon { width: 40px; height: 40px; fill: #e53e3e; flex-shrink: 0; }
        .doc-info { flex: 1; overflow: hidden; }
        .doc-name { font-size: 14px; font-weight: 700; color: #c53030; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .doc-hint { font-size: 11.5px; color: #9b2c2c; margin-top: 2px; }
        .doc-dl-btn { background: var(--primary-blue); color: white; border: none; padding: 10px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 5px; width: 100%; transition: 0.2s; }
        .doc-dl-btn:hover { background: var(--hover-blue); }
        .doc-dl-btn svg { width: 16px; height: 16px; fill: currentColor; }

        .dl-btn { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.7); color: white; border: none; padding: 8px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 5px; backdrop-filter: blur(5px); z-index: 5;}
        .dl-btn:hover { background: var(--primary-blue); }

        /* Fullscreen Viewer */
        #viewer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; display: none; flex-direction: column; align-items: center; }
        #viewer-container { width: 100%; height: 85%; display: flex; justify-content: center; align-items: center; margin-top: 50px; overflow-y: auto;}
        .viewer-close { position: absolute; top: 15px; right: 20px; color: white; font-size: 35px; cursor: pointer; z-index: 3001; }
        
        /* Stats & Actions */
        .stats-bar { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-secondary); padding: 10px 0; border-bottom: 1px solid #f1f1f1; }
        .post-actions { display: flex; padding: 5px 0; }
        .action-btn { flex: 1; background: none; border: none; padding: 10px 0; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; color: var(--text-secondary); font-size: 14.5px; font-weight: 600; border-radius: 6px;}
        .action-btn.liked { color: var(--primary-blue); }

        /* Comments */
        .comments-section { padding: 15px; background: #fff; }
        .cmt-item { display: flex; gap: 10px; margin-bottom: 12px; }
        .cmt-avatar { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; background: #eee; }
        .cmt-body { background: #f0f2f5; padding: 8px 12px; border-radius: 12px; flex: 1; }
        .cmt-user { font-weight: 700; font-size: 13px; color: var(--text-main); }
        .cmt-txt { font-size: 14px; color: #333; margin-top: 2px; }

        .bottom-comment-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; padding: 10px; border-top: 1px solid var(--border-color); z-index: 1000;}
        .inner-wrap { max-width: 600px; margin: 0 auto; display: flex; gap: 8px; }
        .cmt-input { flex: 1; padding: 10px 15px; border: 1px solid #ddd; background: #f0f2f5; border-radius: 20px; outline: none; font-size: 14px;}
        .cmt-btn-send { background: var(--primary-blue); color: #fff; border: none; padding: 0 15px; border-radius: 18px; font-weight: 700; cursor: pointer;}
        .hidden { display: none !important; }
        
        .loading-text { padding: 50px 20px; text-align: center; color: var(--text-secondary); font-weight: 500; }
    </style>
</head>
<body>

    <header>
<button class="back-btn" onclick="window.location.href='index.html'" aria-label="Go Back">
            <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"></path></svg>
        </button>
        <div class="header-title">Post Details</div>
    </header>

    <main id="main-content">
        <article>
            <h1 id="seo-h1" class="hidden">Healthcare Community Post</h1>
            
            <div id="loader" class="loading-text">Fetching post details...</div>
            <div id="post-view" class="hidden"></div>
            
            <section id="comments-wrapper" class="comments-section hidden" aria-label="Comments Section">
                <div style="font-weight: 700; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #eee;">
                    Comments (<span id="c-count-title">0</span>)
                </div>
                <div id="cmt-list"></div>
            </section>
        </article>
    </main>

    <div id="viewer" role="dialog" aria-modal="true">
        <span class="viewer-close" onclick="closeViewer()" aria-label="Close Viewer">&times;</span>
        <div id="viewer-container"></div>
        <div style="padding: 15px;">
            <button id="viewer-dl" class="dl-btn" style="position: static; padding: 10px 25px; margin: 0 auto;">⬇️ Download Original File</button>
        </div>
    </div>

    <div class="bottom-comment-bar hidden" id="comment-bar">
        <div class="inner-wrap">
            <input type="text" class="cmt-input" id="cmt-in" placeholder="Add a comment..." aria-label="Write a comment">
            <button class="cmt-btn-send" onclick="sendComment()">Post</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, collection, query, orderBy, onSnapshot, addDoc, serverTimestamp, increment, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Your Firebase Config
        const config = { apiKey: "AIzaSyD4Cfni7D2Kk_t6qeZ4jcWesIabnSM15mk", authDomain: "jobs-45cc9.firebaseapp.com", projectId: "jobs-45cc9", storageBucket: "jobs-45cc9.firebasestorage.app", messagingSenderId: "21065686301", appId: "1:21065686301:web:f461ea1b8aabe2fa5895f4" };
        const app = initializeApp(config);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');

        let currentUser = null;
        let userData = null;
        let currentPostData = null; 

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // Check Auth Status
        onAuthStateChanged(auth, async (user) => {
            currentUser = user;
            if (user) {
                const userSnap = await getDoc(doc(db, "users", user.uid));
                if(userSnap.exists()) userData = userSnap.data();
            }
            if (postId) {
                listenToPostRealtime();
                listenToComments();
            } else {
                document.getElementById('loader').innerText = "Post ID not found!";
            }
        });

        // Fetch Post Data and Live User Data
        function listenToPostRealtime() {
            onSnapshot(doc(db, "posts", postId), async (docSnap) => {
                if (!docSnap.exists()) {
                    document.getElementById('main-content').innerHTML = "<p class='loading-text'>This post is no longer available or has been deleted.</p>";
                    return;
                }
                

let data = docSnap.data();

                // ✅ posterName/posterPic bhi check karo (employer/candidate posts)
                const ownerUid = data.posterId || data.authorId;
                if (ownerUid) {
                    try {
                        const userDoc = await getDoc(doc(db, "users", ownerUid));
                        if (userDoc.exists()) {
                            const uData = userDoc.data();
                            const realName = uData.fullName || uData.facilityName || null;
                            const realPic = uData.profilePicUrl || null;
                            // Real name aur pic set karo
                            data.authorName = realName || data.posterName || data.authorName || "Healthcare User";
                            data.authorPic = realPic || data.posterPic || data.authorPic || `https://ui-avatars.com/api/?name=${encodeURIComponent(data.authorName)}`;
                            data.authorId = ownerUid;
                            data.location = uData.city || data.location || "Pakistan";
                        }
                    } catch(e) {
                        console.error("Failed to fetch user data:", e);
                        // Fallback to post data
                        data.authorName = data.posterName || data.authorName || "Healthcare User";
                        data.authorPic = data.posterPic || data.authorPic || `https://ui-avatars.com/api/?name=U`;
                        data.authorId = ownerUid;
                    }
                }
                currentPostData = data;
                renderPost(data);
                updateDynamicSEO(data);
            });
        }

        // Render HTML for the Post
        function renderPost(p) {
            document.getElementById('loader').classList.add('hidden');
            const postView = document.getElementById('post-view');
            document.getElementById('comments-wrapper').classList.remove('hidden');
            document.getElementById('comment-bar').classList.remove('hidden');

            const isLiked = p.likes?.includes(currentUser?.uid);
            let mediaHTML = '';
            
            let mediaArr = p.media || [];
            if(mediaArr.length > 0) {
                mediaHTML += `<div class="all-media-container">`;
                mediaArr.forEach((m, index) => {
                    const url = m.url || m;
                    const type = m.type || 'image';
                    const name = m.name || `Attachment ${index + 1}`;

                    if (type === 'pdf' || type === 'document') {
                        mediaHTML += `
                        <div class="doc-box">
                            <div class="doc-box-inner" onclick="openViewer('${url}', '${type}')">
                                <svg class="doc-icon" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"></path></svg>
                                <div class="doc-info">
                                    <div class="doc-name">${name}</div>
                                    <div class="doc-hint">Click to Preview Document</div>
                                </div>
                            </div>
                            <button class="doc-dl-btn" onclick="downloadFile('${url}', this, event, '${type}')">
                                <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg> 
                                Download Securely
                            </button>
                        </div>`;
                    } 
                    else if (type === 'video') {
                        mediaHTML += `
                        <div class="media-wrapper">
                            <video src="${url}" class="media-item" controls onclick="openViewer('${url}', 'video')"></video>
                            <button class="dl-btn" onclick="downloadFile('${url}', this, event, 'video')">⬇️ Download</button>
                        </div>`;
                    } 
                    else {
                        mediaHTML += `
                        <div class="media-wrapper">
                            <img src="${url}" class="media-item" alt="Post Image" onclick="openViewer('${url}', 'image')">
                            <button class="dl-btn" onclick="downloadFile('${url}', this, event, 'image')">⬇️ Save</button>
                        </div>`;
                    }
                });
                mediaHTML += `</div>`;
            }

const safePic = p.authorPic || `https://ui-avatars.com/api/?name=${encodeURIComponent(p.authorName || 'U')}`;

            // ✅ Report ke liye window par save karo
            window.reportPostOwnerName = p.authorName || 'Unknown';
            window.reportPostOwnerPic = safePic;
            window.reportPostTitle = p.title || 'General Post';
            window.reportPostId = postId;

            postView.innerHTML = `
                <div class="post-container">
                    <a href="wid.html?uid=${p.authorId}" class="post-header">
                        <img src="${safePic}" class="post-avatar" alt="${p.authorName}" onerror="this.src='https://ui-avatars.com/api/?name=U'">
                        <div>
                            <div class="user-name">${p.authorName || "Healthcare User"}</div>
                            <div class="post-loc-info">${p.location || 'Pakistan'} • ${p.createdAt ? new Date(p.createdAt.toDate()).toLocaleDateString() : 'Recent'}</div>
                        </div>
                    </a>
                    ${p.title ? `<div class="post-title">${p.title}</div>` : ''}
                    <div class="post-desc">${p.desc || ''}</div>
                    
                    ${mediaHTML}
                    
                    <div class="stats-bar">
                        <span id="l-count">${(p.likes || []).length} Likes</span>
                        <span id="c-count">${p.commentsCount || 0} Comments</span>
                    </div>
                    <div class="post-actions">
                        <button id="like-btn" class="action-btn ${isLiked?'liked':''}" onclick="toggleLike()">👍 Like</button>
                        <button class="action-btn" onclick="document.getElementById('cmt-in').focus()">💬 Comment</button>
                        <button class="action-btn" onclick="sharePost()">🔗 Share</button>
                    </div>

                    <!-- Report Button -->
                    <div class="report-btn-wrap">
                        <button class="report-btn" onclick="openReportPopup()">⚑ Report this Post</button>
                    </div>
                </div>`;
            postView.classList.remove('hidden');
        }

        function updateDynamicSEO(p) {
            const seoTitle = p.title ? `${p.title} | Health Jobs` : `Update from ${p.authorName} | Health Jobs`;
            const seoDesc = p.desc ? p.desc.substring(0, 150) + '...' : `Check out this medical update shared by ${p.authorName} on Health Jobs Portal.`;
            
            document.getElementById('page-title').innerText = seoTitle;
            document.title = seoTitle;
            document.getElementById('meta-desc').content = seoDesc;
            document.getElementById('og-title').content = seoTitle;
            document.getElementById('og-desc').content = seoDesc;
        }

        function listenToComments() {
            onSnapshot(query(collection(db, "posts", postId, "comments"), orderBy("createdAt", "asc")), (snap) => {
                const list = document.getElementById('cmt-list');
                list.innerHTML = "";
                document.getElementById('c-count-title').innerText = snap.size;
snap.forEach(d => {
                    const c = d.data();
                    const cmtPic = c.userPic || `https://ui-avatars.com/api/?name=${encodeURIComponent(c.userName || 'U')}`;
                    const cmtName = c.userName || 'Healthcare User';
                    const cmtUid = c.userId || '';
                    list.innerHTML += `
                        <div class="cmt-item" style="cursor:pointer;" onclick="location.href='wid.html?uid=${cmtUid}'">
                            <img src="${cmtPic}" class="cmt-avatar" alt="${cmtName}" onerror="this.src='https://ui-avatars.com/api/?name=U'">
                            <div class="cmt-body">
                                <span class="cmt-user">${cmtName}</span>
                                <div class="cmt-txt">${c.text}</div>
                            </div>
                        </div>`;
                });
            });
        }

        window.toggleLike = async () => {
            if (!currentUser) { window.location.href='login.html'; return; }
            const isL = document.getElementById('like-btn').classList.contains('liked');
            await updateDoc(doc(db, "posts", postId), { 
                likes: isL ? arrayRemove(currentUser.uid) : arrayUnion(currentUser.uid) 
            });
        };

        window.sendComment = async () => {
            const inp = document.getElementById('cmt-in');
            if (!currentUser) { window.location.href='login.html'; return; }
            if (!inp.value.trim()) return;

            const text = inp.value; inp.value = "";
            const currentName = userData?.fullName || userData?.facilityName || currentUser.displayName || "Healthcare User";
            const currentPic = userData?.profilePicUrl || `https://ui-avatars.com/api/?name=${encodeURIComponent(currentName)}`;

            await addDoc(collection(db, "posts", postId, "comments"), {
                text: text, userId: currentUser.uid, userName: currentName,
                userPic: currentPic, createdAt: serverTimestamp()
            });
            await updateDoc(doc(db, "posts", postId), { commentsCount: increment(1) });
        };

        window.sharePost = () => { 
            if(navigator.share) {
                navigator.share({ title: document.title, url: window.location.href });
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert("Link copied to clipboard!"); 
            }
        };

        // 🚀 FULLY SECURE BASE64 VIEWER HACK
        window.openViewer = async (url, type) => {
            const viewer = document.getElementById('viewer'); 
            const container = document.getElementById('viewer-container');
            const dlBtn = document.getElementById('viewer-dl');
            
            if (type === 'pdf' || type === 'document') {
                container.innerHTML = `
                    <div id="pdf-render-area" style="width:100%; height:100%; text-align:center;">
                        <p id="pdf-loading-msg" style="color:white; margin-top:20px; font-weight:bold;">Loading PDF Preview...</p>
                    </div>`;
                viewer.style.display = 'flex'; 
                document.body.style.overflow = 'hidden';

                try {
                    const res = await fetch(url);
                    let textContent = await res.text();
                    
                    // Reversing the trick: changing text/plain back to application/pdf
                    textContent = textContent.replace("data:text/plain", "data:application/pdf");
                    
                    let pdfSource;
                    if (textContent.startsWith('data:application/pdf;base64,')) {
                        const base64Data = textContent.split(',')[1];
                        const binaryString = window.atob(base64Data);
                        const bytes = new Uint8Array(binaryString.length);
                        for (let i = 0; i < binaryString.length; i++) {
                            bytes[i] = binaryString.charCodeAt(i);
                        }
                        pdfSource = bytes; 
                    } else {
                        pdfSource = url;
                    }

                    const pdf = await pdfjsLib.getDocument(pdfSource).promise;
                    document.getElementById('pdf-loading-msg').style.display = 'none';
                    const renderArea = document.getElementById('pdf-render-area');
                    
                    const maxPages = Math.min(pdf.numPages, 3);
                    for (let pageNum = 1; pageNum <= maxPages; pageNum++) {
                        const page = await pdf.getPage(pageNum); 
                        const viewport = page.getViewport({ scale: 1.2 });
                        const canvas = document.createElement('canvas'); 
                        const context = canvas.getContext('2d');
                        canvas.height = viewport.height; 
                        canvas.width = viewport.width;
                        canvas.style.maxWidth = '95%'; 
                        canvas.style.height = 'auto'; 
                        canvas.style.marginBottom = '15px'; 
                        canvas.style.background = '#fff';
                        canvas.style.borderRadius = '5px';
                        renderArea.appendChild(canvas);
                        await page.render({ canvasContext: context, viewport: viewport }).promise;
                    }
                    if(pdf.numPages > 3) {
                        renderArea.innerHTML += `<p style="color:white; margin-bottom:20px;">Download to view remaining pages.</p>`;
                    }
                } catch(e) {
                    console.error("Preview Error:", e);
                    container.innerHTML = `<p style="color:white; margin-top:20px;">Preview Error. Please download the file to view it.</p>`;
                }
            } else if (type === 'video') {
                container.innerHTML = `<video src="${url}" controls autoplay style="max-width:95%; max-height:100%;"></video>`;
                viewer.style.display = 'flex'; document.body.style.overflow = 'hidden';
            } else {
                container.innerHTML = `<img src="${url}" style="max-width:95%; max-height:100%; object-fit:contain;" alt="Preview">`;
                viewer.style.display = 'flex'; document.body.style.overflow = 'hidden';
            }
            dlBtn.onclick = () => downloadFile(url, dlBtn, null, type);
        };

        window.closeViewer = () => { 
            document.getElementById('viewer').style.display = 'none'; 
            document.getElementById('viewer-container').innerHTML = '';
            document.body.style.overflow = 'auto'; 
        };

        // 🚀 FULLY SECURE BASE64 DOWNLOAD HACK
        window.downloadFile = async (url, btn, event, type) => {
            if(event) event.stopPropagation(); 
            const originalText = btn.innerHTML;
            btn.innerHTML = "⏳ Wait...";
            btn.disabled = true;
            
            try {
                const response = await fetch(url);
                let blobUrl;
                let ext = "pdf";
                
                if (type === 'pdf' || type === 'document') {
                    let textContent = await response.text();
                    
                    // Reversing the trick for downloading correctly
                    textContent = textContent.replace("data:text/plain", "data:application/pdf");
                    
                    if (textContent.startsWith('data:application/pdf;base64,')) {
                        const base64Data = textContent.split(',')[1];
                        const binaryString = window.atob(base64Data);
                        const bytes = new Uint8Array(binaryString.length);
                        for (let i = 0; i < binaryString.length; i++) {
                            bytes[i] = binaryString.charCodeAt(i);
                        }
                        const pdfBlob = new Blob([bytes], { type: 'application/pdf' });
                        blobUrl = window.URL.createObjectURL(pdfBlob);
                    } else {
                        const fallbackRes = await fetch(url);
                        const fbBlob = await fallbackRes.blob();
                        blobUrl = window.URL.createObjectURL(fbBlob);
                    }
                } else {
                    const blob = await response.blob();
                    blobUrl = window.URL.createObjectURL(blob);
                    ext = type === 'image' ? 'png' : 'mp4';
                }
                
                const link = document.createElement('a');
                link.style.display = 'none';
                link.href = blobUrl;
                link.download = `HealthJobs_Document_${Date.now()}.${ext}`;
                document.body.appendChild(link);
                link.click();
                
                setTimeout(() => {
                    document.body.removeChild(link);
                    window.URL.revokeObjectURL(blobUrl);
                }, 5000); 

            } catch (error) {
                console.error("Download Failed:", error);
                window.open(url, '_blank'); 
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        };
    </script>
    <script>
document.addEventListener('DOMContentLoaded', () => {
    if (window.Capacitor && window.Capacitor.Plugins.PushNotifications) {
        const { PushNotifications, LocalNotifications } = window.Capacitor.Plugins;

        const handleCallRedirect = (data) => {
            if (data && (data.isCall === "true" || data.isCall === true || data.startCall === "true")) {
                let callerUid = data.callerUid || data.uid;
                if(callerUid) {
                    setTimeout(() => {
                        window.location.href = `chat.html?uid=${callerUid}&startCall=true&incoming=true`;
                    }, 500);
                }
            }
        };

        PushNotifications.addListener('pushNotificationActionPerformed', (notification) => {
            handleCallRedirect(notification.notification.data);
        });

        PushNotifications.addListener('pushNotificationReceived', async (notification) => {
            const data = notification.data || {};
            
            // ❌ AGAR CANCEL KA SIGNAL AAYE TOH NOTIFICATION GAYAB KAR DO
            if (data.action === "cancel_call") {
                console.log("Call Cancelled! Removing Notifications...");
                if (LocalNotifications) {
                    await LocalNotifications.cancel({ notifications: [{ id: 999 }] });
                }
                await PushNotifications.removeAllDeliveredNotifications();
                
                // Agar user ghalti se chat.html par hi betha hai, toh UI bhi band kar do
                if (typeof closeWebRTC === 'function') { closeWebRTC(); }
                return; // Code yahin rok do
            }

            // 📞 AGAR CALL AAYE TOH NOTIFICATION DIKHAO
            if (data.isCall === "true" || data.isCall === true || data.startCall === "true") {
                handleCallRedirect(data);
                
                if (LocalNotifications) {
                    await LocalNotifications.schedule({
                        notifications: [{
                            title: notification.title || "Incoming Call",
                            body: "Calling...",
                            id: 999, // Yeh ID cancel karne ke kaam aati hai
                            sound: "ringing.mp3",
                            extra: data,
                            android: {
                                channelId: "high_importance_channel",
                                importance: 5,
                                visibility: 1,
                                fullScreenIntent: true
                            }
                        }]
                    });
                }
            }
        });

        if (LocalNotifications) {
            LocalNotifications.addListener('localNotificationActionPerformed', (notification) => {
                handleCallRedirect(notification.notification.extra);
            });
        }
    }
});
</script>

<!-- REPORT POPUP -->
<div class="report-popup" id="report-popup">
    <div class="report-top">
        <h3>⚑ Report this Post</h3>
        <button class="report-close" onclick="closeReport()">✕</button>
    </div>

    <div class="report-owner-box">
        <img id="report-owner-pic" src="" onerror="this.src='https://ui-avatars.com/api/?name=U'">
        <div>
            <div id="report-owner-name" style="font-size:13px;font-weight:700;color:#0f172a;"></div>
            <div style="font-size:11px;color:#64748b;">Post Owner</div>
        </div>
    </div>

    <div class="report-reasons">
        <div class="reason-chip" onclick="selectReason(this)">Fake Info</div>
        <div class="reason-chip" onclick="selectReason(this)">Spam</div>
        <div class="reason-chip" onclick="selectReason(this)">Misleading</div>
        <div class="reason-chip" onclick="selectReason(this)">Abusive</div>
        <div class="reason-chip" onclick="selectReason(this)">Inappropriate</div>
        <div class="reason-chip" onclick="selectReason(this)">Other</div>
    </div>

    <input class="report-input" id="report-name" placeholder="Your Name *" maxlength="50">
    <textarea class="report-input" id="report-msg" placeholder="Describe the issue... *" rows="3" style="resize:none;"></textarea>

    <button class="report-submit" onclick="submitReport()">Send Report</button>
    <div class="report-success" id="report-success">✅ Report submitted! We will review it shortly.</div>
</div>

<script>
let selectedReason = '';

function openReportPopup() {
    document.getElementById('report-owner-name').innerText = window.reportPostOwnerName || 'Unknown';
    document.getElementById('report-owner-pic').src = window.reportPostOwnerPic || 'https://ui-avatars.com/api/?name=U';
    document.getElementById('report-popup').classList.add('show');
}

function closeReport() {
    document.getElementById('report-popup').classList.remove('show');
}

function selectReason(el) {
    document.querySelectorAll('.reason-chip').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    selectedReason = el.innerText;
}

async function submitReport() {
    const name = document.getElementById('report-name').value.trim();
    const msg = document.getElementById('report-msg').value.trim();

    if (!selectedReason) { alert('Please select a reason.'); return; }
    if (!name) { alert('Please enter your name.'); return; }
    if (!msg) { alert('Please describe the issue.'); return; }

    const submitBtn = document.querySelector('.report-submit');
    submitBtn.innerText = 'Sending...';
    submitBtn.disabled = true;

    try {
        await emailjs.send('service_gnjsdvm', 'template_bus1179', {
            reporter_name: name,
            reason: selectedReason,
            message: msg,
            post_owner: window.reportPostOwnerName || 'Unknown',
            post_title: window.reportPostTitle || 'General Post',
            post_id: window.reportPostId || 'N/A',
            post_url: window.location.href
        });

        document.querySelector('.report-submit').style.display = 'none';
        document.getElementById('report-success').style.display = 'block';
        setTimeout(() => closeReport(), 3000);
    } catch(e) {
        alert('Error sending report. Try again.');
        submitBtn.innerText = 'Send Report';
        submitBtn.disabled = false;
    }
}
</script>
