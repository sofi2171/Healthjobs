    <!-- Bot meta fix via Firebase REST (no SDK needed for bots) -->
    <script>
    (function() {
        var ua = navigator.userAgent || '';
        var isBot = /WhatsApp|facebookexternalhit|Twitterbot|LinkedInBot|TelegramBot|Discordbot|Slackbot/i.test(ua);
        if (!isBot) return;
        var postId = new URLSearchParams(window.location.search).get('id');
        if (!postId) return;
        fetch('https://firestore.googleapis.com/v1/projects/jobs-45cc9/databases/(default)/documents/posts/' + postId + '?key=AIzaSyD4Cfni7D2Kk_t6qeZ4jcWesIabnSM15mk')
            .then(function(r){ return r.json(); })
            .then(function(data) {
                if (!data || !data.fields) return;
                var f = data.fields;
                var title = (f.title && f.title.stringValue) || 'Healthcare Opportunity';
                var desc = (f.desc && f.desc.stringValue && f.desc.stringValue.substring(0, 200)) || 'View this post on Health Jobs Portal';
                var fullUrl = 'https://healthjobs-portal.web.app/details.html?id=' + postId;
                document.title = title;
                var setMeta = function(id, val) { var el = document.getElementById(id); if (el) el.setAttribute('content', val); };
                setMeta('meta-desc', desc); setMeta('og-title', title); setMeta('og-desc', desc);
                setMeta('og-url', fullUrl); setMeta('tw-title', title); setMeta('tw-desc', desc);
                var canon = document.getElementById('canonical-url');
                if (canon) canon.setAttribute('href', fullUrl);
            }).catch(function(){});
    })();
    </script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import {
    getFirestore, doc, getDoc, updateDoc, collection,
    query, orderBy, onSnapshot, addDoc, serverTimestamp,
    increment, arrayUnion, arrayRemove
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

// ── Config ──────────────────────────────────────────────────────────────────
const config = {
    apiKey: "AIzaSyD4Cfni7D2Kk_t6qeZ4jcWesIabnSM15mk",
    authDomain: "jobs-45cc9.firebaseapp.com",
    projectId: "jobs-45cc9",
    storageBucket: "jobs-45cc9.firebasestorage.app",
    messagingSenderId: "21065686301",
    appId: "1:21065686301:web:f461ea1b8aabe2fa5895f4"
};
const app = initializeApp(config);
const auth = getAuth(app);
const db = getFirestore(app);

// ── State ────────────────────────────────────────────────────────────────────
const urlParams = new URLSearchParams(window.location.search);
const postId = urlParams.get('id');

let currentUser = null;
let userData = null;
let currentPostData = null;
let postUnsubscribe = null;
let commentsUnsubscribe = null;

// ── Helpers ──────────────────────────────────────────────────────────────────
function escHtml(str) {
    if (!str) return '';
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}

function getShareUrl() {
    return 'https://healthjobs-portal.web.app/details.html?id=' + postId;
}

// ── Auth ─────────────────────────────────────────────────────────────────────
// ✅ نیا — user data بھی cache میں
if (!window._userCache) window._userCache = {};

onAuthStateChanged(auth, async (user) => {
    currentUser = user;
    if (user) {
        // صرف تب fetch کرو جب cache میں نہ ہو
        if (window._userCache[user.uid]) {
            userData = window._userCache[user.uid];
        } else {
            try {
                const snap = await getDoc(doc(db, "users", user.uid));
                if (snap.exists()) {
                    userData = snap.data();
                    window._userCache[user.uid] = userData; // cache میں save
                }
            } catch(e) { console.warn('User data fetch failed:', e); }
        }
    }
    if (!postId) {
        document.getElementById('loader').innerText = "Post ID not found!";
        return;
    }
    startListeners();
});

// ── Listeners (real-time) ────────────────────────────────────────────────────
function startListeners() {
    // Unsubscribe previous listeners (defensive)
    if (postUnsubscribe) postUnsubscribe();
    if (commentsUnsubscribe) commentsUnsubscribe();

    // ── Post listener ────────────────────────────────────────────────────────
    // Uses Firestore local cache → no extra read if page was recently loaded
    postUnsubscribe = onSnapshot(doc(db, "posts", postId), async (docSnap) => {
        if (!docSnap.exists()) {
            document.getElementById('main-content').innerHTML = "<p class='loading-text'>This post is no longer available.</p>";
            return;
        }

        let data = { ...docSnap.data() };

        // Fetch owner info only when posterId exists AND we don't have it yet
        const ownerUid = data.posterId || data.authorId;
        if (ownerUid) {
            // Cache owner data to avoid repeated Firestore reads
            if (!window._ownerCache) window._ownerCache = {};
            let ownerData = window._ownerCache[ownerUid];
            if (!ownerData) {
                try {
                    const uDoc = await getDoc(doc(db, "users", ownerUid));
                    if (uDoc.exists()) {
                        ownerData = uDoc.data();
                        window._ownerCache[ownerUid] = ownerData;
                    }
                } catch(e) { /* use fallback */ }
            }
            if (ownerData) {
                data.authorName = ownerData.fullName || ownerData.facilityName || data.posterName || data.authorName || "Healthcare User";
                data.authorPic  = ownerData.profilePicUrl || data.posterPic || data.authorPic || null;
                data.location   = ownerData.city || data.location || "Pakistan";
            }
            data.authorId = ownerUid;
        }

        data.authorName = data.authorName || data.posterName || "Healthcare User";
        data.authorPic  = data.authorPic  || data.posterPic  || null;

        currentPostData = data;
        renderPost(data);
        updateSEO(data);
    }, (err) => {
        console.error('Post listener error:', err);
        document.getElementById('loader').innerText = 'Error loading post. Please refresh.';
    });

    // ── Comments listener ────────────────────────────────────────────────────
    commentsUnsubscribe = onSnapshot(
        query(collection(db, "posts", postId, "comments"), orderBy("createdAt", "asc")),
        (snap) => {
            const list = document.getElementById('cmt-list');
            if (!list) return;
            const fragment = document.createDocumentFragment();
            snap.forEach(d => {
                const c = d.data();
                const cmtPic  = c.userPic || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(c.userName || 'U');
                const cmtName = escHtml(c.userName || 'Healthcare User');
                const cmtUid  = c.userId || '';
                const cmtTxt  = escHtml(c.text || '');

                const el = document.createElement('div');
                el.className = 'cmt-item';
                el.onclick = () => { location.href = 'wid.html?uid=' + cmtUid; };
                el.innerHTML = `
                    <img src="${escHtml(cmtPic)}" class="cmt-avatar" alt="${cmtName}" loading="lazy" onerror="this.src='https://ui-avatars.com/api/?name=U'">
                    <div class="cmt-body">
                        <span class="cmt-user">${cmtName}</span>
                        <div class="cmt-txt">${cmtTxt}</div>
                    </div>`;
                fragment.appendChild(el);
            });
            list.innerHTML = '';
            list.appendChild(fragment);
// ✅ نیا — دونوں counters ایک ساتھ update
const cmtCountEl = document.getElementById('c-count-title');
            const cmtCountEl2 = document.getElementById('c-count');
            if (cmtCountEl) cmtCountEl.innerText = snap.size;
            if (cmtCountEl2) cmtCountEl2.innerText = snap.size + ' Comments';
        },
        (err) => { console.error('Comments listener error:', err); }
    );
}

// ── Render Post ───────────────────────────────────────────────────────────────
function renderPost(p) {
    document.getElementById('loader').classList.add('hidden');
    document.getElementById('comments-wrapper').classList.remove('hidden');
    document.getElementById('comment-bar').classList.remove('hidden');

    const likesArr   = Array.isArray(p.likes) ? p.likes : [];
    const isLiked    = currentUser ? likesArr.includes(currentUser.uid) : false;
    const likesCount = likesArr.length;

    // Media HTML
    let mediaHTML = '';
    const mediaArr = Array.isArray(p.media) ? p.media : [];
    if (mediaArr.length > 0) {
        mediaHTML = '<div class="all-media-container">';
        mediaArr.forEach((m, idx) => {
            const url  = escHtml(m.url || m);
            const type = m.type || 'image';
            const name = escHtml(m.name || ('Attachment ' + (idx + 1)));
            if (type === 'pdf' || type === 'document') {
                mediaHTML += `
                <div class="doc-box">
                    <div class="doc-box-inner" onclick="openViewer('${url}','${type}')">
                        <svg class="doc-icon" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
                        <div class="doc-info">
                            <div class="doc-name">${name}</div>
                            <div class="doc-hint">Tap to Preview Document</div>
                        </div>
                    </div>
                    <button class="doc-dl-btn" onclick="downloadFile('${url}',this,event,'${type}')">
                        <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                        Download Securely
                    </button>
                </div>`;
            } else if (type === 'video') {
                mediaHTML += `
                <div class="media-wrapper">
                    <video src="${url}" class="media-item" controls preload="metadata" onclick="openViewer('${url}','video')"></video>
                    <button class="dl-btn" onclick="downloadFile('${url}',this,event,'video')">Download</button>
                </div>`;
            } else {
                mediaHTML += `
                <div class="media-wrapper">
                    <img src="${url}" class="media-item" alt="Post Image" loading="lazy" onclick="openViewer('${url}','image')">
                    <button class="dl-btn" onclick="downloadFile('${url}',this,event,'image')">Save</button>
                </div>`;
            }
        });
        mediaHTML += '</div>';
    }

    const safePic = p.authorPic || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(p.authorName || 'U');
    const safeAuthorName = escHtml(p.authorName || 'Healthcare User');
    const safeLocation   = escHtml(p.location || 'Pakistan');
    const safeTitle      = escHtml(p.title || '');
    const authorId       = escHtml(p.authorId || '');
    const dateStr        = p.createdAt ? new Date(p.createdAt.toDate()).toLocaleDateString() : 'Recent';

    // Store for report popup
    window._reportData = {
        ownerName : p.authorName  || 'Unknown',
        ownerPic  : safePic,
        postTitle : p.title       || 'General Post',
        postId    : postId
    };

    const postView = document.getElementById('post-view');
    postView.innerHTML = `
        <div class="post-container">
            <a href="wid.html?uid=${authorId}" class="post-header">
                <img src="${escHtml(safePic)}" class="post-avatar" alt="${safeAuthorName}" loading="lazy" onerror="this.src='https://ui-avatars.com/api/?name=U'">
                <div>
                    <div class="user-name">${safeAuthorName}</div>
                    <div class="post-loc-info">${safeLocation} &bull; ${dateStr}</div>
                </div>
            </a>
            ${safeTitle ? `<div class="post-title">${safeTitle}</div>` : ''}
            <div class="post-desc">${escHtml(p.desc || '')}</div>
            ${mediaHTML}
            <div class="stats-bar">
                <span id="l-count">${likesCount} ${likesCount === 1 ? 'Like' : 'Likes'}</span>
                <span id="c-count">${p.commentsCount || 0} Comments</span>
            </div>
            <div class="post-actions">
                <button id="like-btn" class="action-btn ${isLiked ? 'liked' : ''}" onclick="toggleLike()">
                    <svg viewBox="0 0 24 24"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/></svg>
                    Like
                </button>
                <button class="action-btn" onclick="focusComment()">
                    <svg viewBox="0 0 24 24"><path d="M21.99 4c0-1.1-.89-2-1.99-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4-.01-18z"/></svg>
                    Comment
                </button>
                <button class="action-btn" onclick="sharePost()">
                    <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg>
                    Share
                </button>
            </div>
            <div class="report-btn-wrap">
                <button class="report-btn" onclick="openReportPopup()">Report this Post</button>
            </div>
        </div>`;
    postView.classList.remove('hidden');
}

// ── SEO ───────────────────────────────────────────────────────────────────────
function updateSEO(p) {
    const title   = p.title ? p.title + ' | Health Jobs' : 'Update from ' + (p.authorName || 'User') + ' | Health Jobs';
    const desc    = p.desc ? p.desc.substring(0, 150) + '...' : 'Check out this update on Health Jobs Portal.';
    const imgUrl  = (Array.isArray(p.media) && p.media.length > 0 && (!p.media[0].type || p.media[0].type === 'image'))
                    ? (p.media[0].url || p.media[0])
                    : 'https://healthjobs-portal.web.app/images/logo.png';
    const fullUrl = getShareUrl();

    document.title = title;
    var setM = function(id, v) { var e = document.getElementById(id); if (e) e.setAttribute('content', v); };
    setM('meta-desc', desc); setM('og-title', title); setM('og-desc', desc);
    setM('og-image', imgUrl); setM('og-url', fullUrl);
    setM('tw-title', title); setM('tw-desc', desc); setM('tw-image', imgUrl);
    var canon = document.getElementById('canonical-url');
    if (canon) canon.setAttribute('href', fullUrl);

    var shareLinkEl = document.getElementById('share-link-text');
    if (shareLinkEl) shareLinkEl.textContent = fullUrl;

    if (window.history && window.history.replaceState) {
        window.history.replaceState({}, title, 'details.html?id=' + postId);
    }
}

// ── Actions ───────────────────────────────────────────────────────────────────
// Like
window.toggleLike = async function() {
    if (!currentUser) { redirectToLogin(); return; }
    const btn = document.getElementById('like-btn');
    if (!btn) return;
    const wasLiked = btn.classList.contains('liked');
    btn.classList.toggle('liked');  // Optimistic UI
    try {
        await updateDoc(doc(db, "posts", postId), {
            likes: wasLiked ? arrayRemove(currentUser.uid) : arrayUnion(currentUser.uid)
        });
    } catch(e) {
        btn.classList.toggle('liked');  // Rollback
        console.error("Like failed:", e);
    }
};

// Focus comment
window.focusComment = function() {
    if (!currentUser) { redirectToLogin(); return; }
    const inp = document.getElementById('cmt-in');
    if (inp) inp.focus();
};

// Send comment
async function doSendComment() {
    if (!currentUser) { redirectToLogin(); return; }
    const inp = document.getElementById('cmt-in');
    if (!inp || !inp.value.trim()) return;
    const text = inp.value.trim();
    inp.value = '';
    const name = userData?.fullName || userData?.facilityName || currentUser.displayName || "Healthcare User";
    const pic  = userData?.profilePicUrl || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(name);
    try {
        await addDoc(collection(db, "posts", postId, "comments"), {
            text, userId: currentUser.uid, userName: name, userPic: pic, createdAt: serverTimestamp()
        });
        await updateDoc(doc(db, "posts", postId), { commentsCount: increment(1) });
    } catch(e) {
        inp.value = text;
        console.error("Comment failed:", e);
    }
}

// Share
window.sharePost = function() {
    const url = getShareUrl();
    var linkEl = document.getElementById('share-link-text');
    if (linkEl) linkEl.textContent = url;
    if (navigator.share) {
        navigator.share({ title: document.title, text: 'Check out this healthcare opportunity!', url: url })
            .catch(function(err) {
                if (err.name !== 'AbortError') document.getElementById('share-popup').classList.add('show');
            });
    } else {
        document.getElementById('share-popup').classList.add('show');
    }
};

// Copy share link
window.copyShareLink = function() {
    var url = getShareUrl();
    var btn = document.getElementById('share-copy-btn');
    var done = function() { if(btn){ btn.textContent = '✓ Copied!'; setTimeout(function(){ btn.textContent = 'Copy'; }, 2000); } };
    if (navigator.clipboard) {
        navigator.clipboard.writeText(url).then(done).catch(function() { fallbackCopy(url); done(); });
    } else { fallbackCopy(url); done(); }
};

function fallbackCopy(text) {
    var el = document.createElement('textarea');
    el.value = text; el.style.cssText = 'position:fixed;left:-9999px;top:-9999px;';
    document.body.appendChild(el); el.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(el);
}

// Viewer
window.openViewer = async function(url, type) {
    const viewer    = document.getElementById('viewer');
    const container = document.getElementById('viewer-container');
    const dlBtn     = document.getElementById('viewer-dl');
    viewer.style.display = 'flex';
    document.body.style.overflow = 'hidden';
    dlBtn.onclick = function() { downloadFile(url, dlBtn, null, type); };

    if (type === 'pdf' || type === 'document') {
        container.innerHTML = '<div id="pdf-render-area" style="width:100%;text-align:center;padding:10px;"><p id="pdf-loading-msg" style="color:white;margin-top:20px;font-weight:bold;">Loading PDF Preview...</p></div>';
        window._loadPdfJs(async function() {
            try {
                const res = await fetch(url);
                let text = await res.text();
                text = text.replace('data:text/plain', 'data:application/pdf');
                let src;
                if (text.startsWith('data:application/pdf;base64,')) {
                    const b64 = text.split(',')[1];
                    const bin = atob(b64);
                    const bytes = new Uint8Array(bin.length);
                    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
                    src = bytes;
                } else { src = url; }
                const pdf = await pdfjsLib.getDocument(src).promise;
                const area = document.getElementById('pdf-render-area');
                var msg = document.getElementById('pdf-loading-msg');
                if (msg) msg.style.display = 'none';
                const maxPages = Math.min(pdf.numPages, 3);
                for (let pn = 1; pn <= maxPages; pn++) {
                    const page = await pdf.getPage(pn);
                    const vp = page.getViewport({ scale: 1.2 });
                    const canvas = document.createElement('canvas');
                    canvas.height = vp.height; canvas.width = vp.width;
                    canvas.style.cssText = 'max-width:95%;height:auto;margin-bottom:15px;background:#fff;border-radius:5px;display:block;margin-left:auto;margin-right:auto;';
                    area.appendChild(canvas);
                    await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
                }
                if (pdf.numPages > 3) area.innerHTML += '<p style="color:white;margin-bottom:20px;text-align:center;">Download to view remaining pages.</p>';
            } catch(e) {
                container.innerHTML = '<p style="color:white;margin-top:30px;text-align:center;">Preview unavailable. Please download the file.</p>';
            }
        });
    } else if (type === 'video') {
        container.innerHTML = `<video src="${url}" controls autoplay style="max-width:95%;max-height:100%;"></video>`;
    } else {
        container.innerHTML = `<img src="${url}" style="max-width:95%;max-height:100%;object-fit:contain;" alt="Preview" loading="lazy">`;
    }
};

window.closeViewer = function() {
    document.getElementById('viewer').style.display = 'none';
    document.getElementById('viewer-container').innerHTML = '';
    document.body.style.overflow = 'auto';
};

window.downloadFile = async function(url, btn, event, type) {
    if (event) event.stopPropagation();
    var orig = btn.innerHTML;
    btn.innerHTML = 'Please wait...';
    btn.disabled = true;
    try {
        const resp = await fetch(url);
        let blobUrl, ext = 'pdf';
        if (type === 'pdf' || type === 'document') {
            let txt = await resp.text();
            txt = txt.replace('data:text/plain', 'data:application/pdf');
            if (txt.startsWith('data:application/pdf;base64,')) {
                const bin = atob(txt.split(',')[1]);
                const bytes = new Uint8Array(bin.length);
                for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
                blobUrl = URL.createObjectURL(new Blob([bytes], { type: 'application/pdf' }));
            } else { blobUrl = URL.createObjectURL(await (await fetch(url)).blob()); }
        } else {
            blobUrl = URL.createObjectURL(await resp.blob());
            ext = type === 'image' ? 'png' : 'mp4';
        }
        var a = document.createElement('a');
        a.style.display = 'none'; a.href = blobUrl;
        a.download = 'HealthJobs_Document_' + Date.now() + '.' + ext;
        document.body.appendChild(a); a.click();
        setTimeout(function() { document.body.removeChild(a); URL.revokeObjectURL(blobUrl); }, 5000);
    } catch(e) { window.open(url, '_blank'); }
    finally { btn.innerHTML = orig; btn.disabled = false; }
};

// ── DOM Event Bindings ────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {

// ── Push Notifications (Capacitor) ───────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
    if (!window.Capacitor || !window.Capacitor.Plugins || !window.Capacitor.Plugins.PushNotifications) return;
    var PushNotifications  = window.Capacitor.Plugins.PushNotifications;
    var LocalNotifications = window.Capacitor.Plugins.LocalNotifications;

    function handleCallRedirect(data) {
        if (!data) return;
        if (data.isCall === 'true' || data.isCall === true || data.startCall === 'true') {
            var callerUid = data.callerUid || data.uid;
            if (callerUid) setTimeout(function() { window.location.href = 'chat.html?uid=' + callerUid + '&startCall=true&incoming=true'; }, 500);
        }
    }

    PushNotifications.addListener('pushNotificationActionPerformed', function(n) { handleCallRedirect(n.notification.data); });
    PushNotifications.addListener('pushNotificationReceived', async function(n) {
        var data = n.data || {};
        if (data.action === 'cancel_call') {
            if (LocalNotifications) await LocalNotifications.cancel({ notifications: [{ id: 999 }] });
            await PushNotifications.removeAllDeliveredNotifications();
            if (typeof closeWebRTC === 'function') closeWebRTC();
            return;
        }
        if (data.isCall === 'true' || data.isCall === true || data.startCall === 'true') {
            handleCallRedirect(data);
            if (LocalNotifications) {
                await LocalNotifications.schedule({ notifications: [{
                    title: n.title || 'Incoming Call', body: 'Calling...', id: 999,
                    sound: 'ringing.mp3', extra: data,
                    android: { channelId: 'high_importance_channel', importance: 5, visibility: 1, fullScreenIntent: true }
                }] });
            }
        }
    });
    if (LocalNotifications) {
        LocalNotifications.addListener('localNotificationActionPerformed', function(n) { handleCallRedirect(n.notification.extra); });
    }
});
let startY = 0;
const pullToRefresh = document.getElementById('pull-to-refresh');
const spinner = pullToRefresh.querySelector('.refresh-spinner');

// جب انگلی یا ماؤس اسکرین پر لگے
window.addEventListener('touchstart', (e) => {
    // صرف تب کام کرے جب پیج بالکل اوپر (top: 0) ہو
    if (window.scrollY === 0) {
        startY = e.touches[0].pageY;
    }
}, {passive: true});

// جب اسکرین کو نیچے کھینچا جائے
window.addEventListener('touchmove', (e) => {
    const y = e.touches[0].pageY;
    const pullDistance = y - startY;

    if (pullDistance > 0 && window.scrollY === 0) {
        // لوڈر کو نیچے لائیں (زیادہ سے زیادہ 80px تک)
        const move = Math.min(pullDistance / 2, 80);
        pullToRefresh.style.transform = `translateY(${move}px)`;
        
        // جیسے جیسے کھینچیں اسپنر تھوڑا مڑے
        spinner.style.transform = `rotate(${pullDistance * 2}deg)`;
    }
}, {passive: true});

// جب انگلی اسکرین سے ہٹا لی جائے
window.addEventListener('touchend', (e) => {
    const endY = e.changedTouches[0].pageY;
    const pullDistance = endY - startY;

    if (pullDistance > 100 && window.scrollY === 0) {
        // ریفریش شروع کریں
        pullToRefresh.style.transform = `translateY(70px)`;
        spinner.classList.add('spinning');

        // یہاں اپنا ڈیٹا لوڈ کرنے والا فنکشن کال کریں
        console.log("Refreshing data...");
        
        setTimeout(() => {
            // 2 سیکنڈ بعد واپس چھپا دیں (آپ اپنی ضرورت کے مطابق سیٹ کریں)
            resetPullToRefresh();
            location.reload(); // پیج ریفریش کرنے کے لیے
        }, 1500);
    } else {
        resetPullToRefresh();
    }
});

function resetPullToRefresh() {
    pullToRefresh.style.transform = `translateY(0)`;
    setTimeout(() => {
        spinner.classList.remove('spinning');
    }, 200);
}
