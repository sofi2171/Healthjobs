<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Health Jobs | Secure Portal</title>
    <link rel="preconnect" href="https://www.gstatic.com">
    <link rel="preconnect" href="https://challenges.cloudflare.com">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <style>
        :root { --primary: #0d9488; --surface: #ffffff; --text-main: #0f172a; --text-muted: #64748b; --border-color: #e2e8f0; --error: #ef4444; --success-text: #059669; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; }
        body { background-color: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .auth-container { background: var(--surface); width: 100%; max-width: 450px; padding: 40px 32px; border-radius: 16px; border: 1px solid var(--border-color); position: relative; }
        .brand-header { text-align: center; margin-bottom: 32px; }
        .brand-header img { height: 48px; margin-bottom: 16px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; }
        .input-wrapper input, .input-wrapper select { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; }
        .btn-primary { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .btn-google { width: 100%; padding: 12px; background: var(--surface); border: 1px solid var(--border-color); border-radius: 8px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 20px;}
        .status-message { margin-top: 16px; font-size: 13px; text-align: center; font-weight: 500; color: var(--error); }
        .hidden { display: none !important; }
        .spinner { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top: 2px solid white; border-radius: 50%; animation: spin 0.6s linear infinite; display: none; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="auth-container">
        <div id="auth-view">
            <div class="brand-header">
                <h1>Healthjobs Login</h1>
                <p>Securely access your professional dashboard</p>
            </div>

            <form id="auth-form" onsubmit="handleAuth(event)">
                <div class="form-group"><label>Work Email</label><div class="input-wrapper"><input type="email" id="email" required></div></div>
                <div class="form-group"><label>Password</label><div class="input-wrapper"><input type="password" id="password" required></div></div>
                <button type="submit" class="btn-primary">Sign In</button>
            </form>

            <button type="button" class="btn-google" id="google-btn" onclick="handleGoogleAuth()">
                <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path></svg>
                Sign in with Google
            </button>
            <div id="status-msg" class="status-message"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signInWithCredential } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD4Cfni7D2Kk_t6qeZ4jcWesIabnSM15mk",
            authDomain: "jobs-45cc9.firebaseapp.com",
            projectId: "jobs-45cc9",
            storageBucket: "jobs-45cc9.firebasestorage.app",
            messagingSenderId: "21065686301",
            appId: "1:21065686301:web:f461ea1b8aabe2fa5895f4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        window.handleGoogleAuth = async function() {
            const msgBox = document.getElementById('status-msg');
            msgBox.innerText = "Starting Google Login...";
            msgBox.style.color = "var(--text-main)";
            
            try { 
                if (window.Capacitor && window.Capacitor.isNativePlatform()) {
                    // 🔥 MAGIC FIX: Force Client ID into the plugin before it runs! 🔥
                    await Capacitor.Plugins.GoogleAuth.initialize({
                        clientId: "21065686301-145no417sg9qudgkt619foccih0hnt11.apps.googleusercontent.com",
                        scopes: ["profile", "email"],
                        grantOfflineAccess: true
                    });

                    const googleUser = await Capacitor.Plugins.GoogleAuth.signIn();
                    const credential = GoogleAuthProvider.credential(googleUser.authentication.idToken);
                    await signInWithCredential(auth, credential);
                    
                    msgBox.style.color = "var(--success-text)";
                    msgBox.innerText = "Login Success! Redirecting...";
                    setTimeout(() => { window.location.replace("index.html"); }, 1000);
                } 
                else {
                    await signInWithPopup(auth, provider); 
                    window.location.replace("index.html");
                }
            } catch (error) { 
                // Agar native crash hone ki koshish bhi karega to catch ho jayega!
                msgBox.style.color = "var(--error)";
                msgBox.innerText = "Error: " + (error.message || JSON.stringify(error));
            }
        };
    </script>
</body>
</html>
