<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Share Medical Updates & Clinical Cases | Health Jobs Portal</title>
    <meta name="description" content="Share the latest medical updates, clinical cases, and healthcare news with Pakistan's top professionals. Join the discussion on Health Jobs Portal.">
    <meta name="keywords" content="medical updates Pakistan, clinical cases, healthcare news, medical discussion, Health Jobs Portal">
    
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://healthjobs-portal.web.app/simple.html" />

    <meta property="og:title" content="Share Medical Updates | Health Jobs Portal">
    <meta property="og:description" content="Share clinical cases and medical news with Pakistan's healthcare community.">
    <meta property="og:image" content="https://healthjobs-portal.web.app/images/logo.png">
    <meta property="og:url" content="https://healthjobs-portal.web.app/simple.html">
    <meta property="og:type" content="article">

    <style>
        /* Modern SaaS Theme Variables */
        :root { 
            --primary-blue: #0a66c2; 
            --hover-blue: #004182; 
            --bg-white: #ffffff; 
            --bg-body: #f8fafc; 
            --text-main: #0f172a; 
            --text-secondary: #64748b; 
            --border-color: #e2e8f0; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
        
        body { background-color: var(--bg-body); color: var(--text-main); min-height: 100vh; padding-top: 80px; display: flex; flex-direction: column; }

        /* Header */
        header { background-color: var(--bg-white); padding: 0 16px; display: flex; align-items: center; position: fixed; top: 0; left: 0; width: 100%; height: 65px; z-index: 1000; border-bottom: 1px solid var(--border-color); box-shadow: 0 1px 2px rgba(0,0,0,0.02); }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .back-btn { background: #f1f5f9; border: none; border-radius: 50%; width: 36px; height: 36px; color: var(--text-main); cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.2s;}
        .back-btn:active { background: #e2e8f0; transform: scale(0.95); }
        .logo-img { height: 35px; object-fit: contain; cursor: pointer; }

        /* Main Form */
        main { flex: 1 0 auto; padding: 20px 15px; max-width: 600px; width: 100%; margin: 0 auto; }
        .post-card { background: var(--bg-white); padding: 20px; border-radius: 14px; border: 1px solid var(--border-color); box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04); }

        .post-header { margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 48px; height: 48px; border-radius: 50%; background: #e2e8f0; object-fit: cover; border: 1px solid var(--border-color); }
        .user-name { font-size: 15px; font-weight: 700; color: var(--text-main); }
        .post-visibility { font-size: 11px; color: var(--text-secondary); background: #f1f5f9; padding: 3px 8px; border-radius: 12px; margin-top: 3px; display: inline-block; font-weight: 600;}

        .post-title-input { width: 100%; border: none; font-size: 18px; font-weight: 700; color: var(--text-main); outline: none; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid var(--border-color); background: transparent;}
        .post-title-input::placeholder { color: #94a3b8; }
        
        .post-textarea { width: 100%; border: none; font-size: 16px; outline: none; resize: none; min-height: 120px; color: var(--text-main); margin-bottom: 15px; line-height: 1.5; background: transparent;}
        .post-textarea::placeholder { color: #94a3b8; }

        .link-input-container { display: flex; align-items: center; gap: 10px; background: #f8fafc; padding: 12px 15px; border-radius: 8px; border: 1px solid var(--border-color); margin-bottom: 20px; transition: 0.2s;}
        .link-input-container:focus-within { border-color: var(--primary-blue); box-shadow: 0 0 0 3px rgba(10, 102, 194, 0.1); }
        .link-input { border: none; background: transparent; outline: none; width: 100%; font-size: 14px; color: var(--primary-blue);}

        /* Media Preview */
        .preview-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .preview-item { position: relative; width: calc(33.33% - 6px); aspect-ratio: 1; border-radius: 8px; overflow: hidden; background: #f1f5f9; display: flex; align-items: center; justify-content: center; flex-direction: column; border: 1px solid var(--border-color);}
        .preview-item img, .preview-item video { width: 100%; height: 100%; object-fit: cover; }
        .file-icon { width: 40px; fill: #64748b; }
        .file-name { font-size: 10px; text-align: center; margin-top: 5px; color: var(--text-secondary); font-weight: 600; padding: 0 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%;}
        .remove-btn { position: absolute; top: 4px; right: 4px; background: rgba(15, 23, 42, 0.7); color: #fff; border: none; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 14px; z-index: 10;}

        /* Toolbar & Button */
        .add-media-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 12px; background: #f0f7ff; color: var(--primary-blue); border: 1px dashed #bae6fd; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 14px;}
        .add-media-btn:hover { background: #e0f2fe; }
        .btn-submit { width: 100%; padding: 14px; background: var(--primary-blue); color: white; border: none; border-radius: 24px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 20px; transition: 0.2s;}
        .btn-submit:active { transform: scale(0.98); background: var(--hover-blue); }

        /* Loader */
        .loader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { width: 40px; height: 40px; border: 3px solid #e2e8f0; border-top: 3px solid var(--primary-blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .hidden { display: none !important; }

        /* Footer */
        footer { margin-top: auto; background-color: var(--bg-white); padding: 40px 20px; border-top: 1px solid var(--border-color); text-align: center; }
        .footer-logo { height: 30px; object-fit: contain; margin-bottom: 8px; opacity: 0.8; }
        .footer-tagline { font-size: 12.5px; color: var(--text-secondary); font-weight: 500; margin-bottom: 20px; }
        .footer-links { display: flex; justify-content: center; flex-wrap: wrap; align-items: center; margin-bottom: 20px; gap: 15px; }
        .footer-links a { color: var(--text-secondary); text-decoration: none; font-size: 13px; font-weight: 600; transition: 0.2s; }
        .footer-links a:hover { color: var(--primary-blue); }
        .footer-copy { font-size: 12px; color: #94a3b8; font-weight: 500; }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <button class="back-btn" onclick="location.href='index.html'">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            </button>
            <img src="images/logo.png" class="logo-img" alt="Health Jobs" onerror="this.src='https://via.placeholder.com/120x35?text=Health+Jobs'">
        </div>
    </header>

    <main>
        <div class="post-card">
            <div class="post-header">
                <img src="https://ui-avatars.com/api/?name=U" id="user-display-pic" class="user-avatar">
                <div>
                    <div class="user-name" id="user-display-name">Loading...</div>
                    <div class="post-visibility">🌎 Public Update</div>
                </div>
            </div>

            <input type="text" id="post-title" class="post-title-input" placeholder="Add a title (Optional)">
            <textarea id="post-desc" class="post-textarea" placeholder="Share a medical update, case, or thoughts..."></textarea>

            <div class="link-input-container">
                <svg viewBox="0 0 24 24" width="18" fill="var(--text-secondary)"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"></path></svg>
                <input type="url" id="post-link" class="link-input" placeholder="Attach an external link (Optional)">
            </div>

            <div id="preview-container" class="preview-grid hidden"></div>

            <div style="margin-bottom: 10px;">
                <button class="add-media-btn" onclick="document.getElementById('file-input').click()">
                    <svg viewBox="0 0 24 24" width="20" fill="currentColor"><path d="M19 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>
                    Attach Images, Videos or PDF
                </button>
                <input type="file" id="file-input" multiple accept="image/*,video/*,.pdf" class="hidden">
            </div>

            <button class="btn-submit" id="submit-btn">Publish Now</button>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <img src="images/logo.png" alt="Health Jobs" class="footer-logo" onerror="this.src='https://via.placeholder.com/120x35?text=Health+Jobs'">
            <p class="footer-tagline">Pakistan's #1 Digital Healthcare Network</p>
            <div class="footer-links">
                <a href="index.html">Home</a><a href="about.html">About Us</a><a href="terms.html">Terms</a><a href="privcy.html">Privacy</a>
            </div>
            <div class="footer-copy">&copy; 2026 Powered by Health Jobs Portal</div>
        </div>
    </footer>

    <div id="upload-loader" class="loader-overlay hidden">
        <div class="spinner"></div>
        <p id="loader-msg" style="margin-top:15px; font-weight:600; color:var(--text-main);">Processing...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD4Cfni7D2Kk_t6qeZ4jcWesIabnSM15mk",
            authDomain: "jobs-45cc9.firebaseapp.com",
            databaseURL: "https://jobs-45cc9-default-rtdb.firebaseio.com", 
            projectId: "jobs-45cc9",
            storageBucket: "jobs-45cc9.firebasestorage.app",
            messagingSenderId: "21065686301",
            appId: "1:21065686301:web:f461ea1b8aabe2fa5895f4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const dbRT = getDatabase(app);
        
        const CLOUD_NAME = "Dr06qkbaa"; 
        const UPLOAD_PRESET = "nearjobs_profiles"; 

        let currentUser = null, userData = null, selectedFilesArray = [];

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                try {
                    const snap = await getDoc(doc(db, "users", user.uid));
                    if (snap.exists()) {
                        userData = snap.data();
                        const displayName = userData.fullName || userData.facilityName || "Member";
                        document.getElementById('user-display-name').innerText = displayName;
                        if (userData.profilePicUrl) {
                            document.getElementById('user-display-pic').src = userData.profilePicUrl;
                        }
                    } else {
                        document.getElementById('user-display-name').innerText = "Member";
                    }
                } catch (error) {
                    console.error("Error fetching user profile:", error);
                    document.getElementById('user-display-name').innerText = "Error Loading Name";
                }
            } else { 
                window.location.replace("login.html"); 
            }
        });

        document.getElementById('file-input').addEventListener('change', function(e) {
            selectedFilesArray = selectedFilesArray.concat(Array.from(e.target.files)).slice(0, 5);
            this.value = ''; 
            renderPreviews();
        });

        function renderPreviews() {
            const container = document.getElementById('preview-container');
            if (selectedFilesArray.length === 0) { container.classList.add('hidden'); return; }
            container.classList.remove('hidden'); 
            container.innerHTML = '';
            
            selectedFilesArray.forEach((file, index) => {
                const itemDiv = document.createElement('div'); 
                itemDiv.className = 'preview-item';
                
                const removeBtn = document.createElement('button'); 
                removeBtn.className = 'remove-btn'; 
                removeBtn.innerHTML = '&times;';
                removeBtn.onclick = () => { selectedFilesArray.splice(index, 1); renderPreviews(); };
                itemDiv.appendChild(removeBtn);
                
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (ev) => { const img = document.createElement('img'); img.src = ev.target.result; itemDiv.appendChild(img); };
                    reader.readAsDataURL(file);
                } else if (file.type.startsWith('video/')) {
                    itemDiv.innerHTML += `<video src="${URL.createObjectURL(file)}"></video>`;
                } else {
                    itemDiv.innerHTML += `<svg class="file-icon" viewBox="0 0 24 24"><path d="M20 2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8.5 7.5c0 .83-.67 1.5-1.5 1.5H9v2H7.5V7H10c.83 0 1.5.67 1.5 1.5v1zm5 2c0 .83-.67 1.5-1.5 1.5h-2.5V7H15c.83 0 1.5.67 1.5 1.5v3zm4-3H19v1h1.5V11H19v2h-1.5V7h3v1.5zM9 9.5h1v-1H9v1zM4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm10 5.5h1v-3h-1v3z"></path></svg><div class="file-name" title="${file.name}">${file.name}</div>`;
                }
                container.appendChild(itemDiv);
            });
        }

        // 🚀 ULTIMATE CLOUDINARY BYPASS HACK
        async function uploadToCloudinary(file) {
            let uploadFile = file;
            let type = 'image';
            let originalName = file.name;
            let endpoint = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`;

            if (file.type.startsWith('video/')) type = 'video';
            
            // --- BASE64 PDF ENCODER HACK ---
            if (file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf')) {
                type = 'pdf';
                const base64String = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result);
                    reader.readAsDataURL(file);
                });
                
                // Cloudinary کو دھوکہ دینے کے لیے ہم PDF کے سگنیچر کو غائب کر رہے ہیں
                const trickedString = base64String.replace("data:application/pdf", "data:text/plain");
                
                uploadFile = new File([trickedString], "secure_doc.txt", { type: 'text/plain' });
                
                // RAW endpoint کا استعمال تاکہ Cloudinary اس فائل کو سکین نہ کرے
                endpoint = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/raw/upload`;
            }
            // --------------------------------

            const formData = new FormData();
            formData.append('file', uploadFile);
            formData.append('upload_preset', UPLOAD_PRESET);
            
            const res = await fetch(endpoint, { method: 'POST', body: formData });
            const data = await res.json();
            
            if (data.error) throw new Error(data.error.message);

            return { url: data.secure_url, type: type, name: originalName };
        }

        document.getElementById('submit-btn').onclick = async () => {
            const desc = document.getElementById('post-desc').value.trim();
            const title = document.getElementById('post-title').value.trim();
            const link = document.getElementById('post-link').value.trim();
            
            if(!desc && !title && selectedFilesArray.length === 0) {
                return alert("Please add some text or media before publishing.");
            }

            document.getElementById('upload-loader').classList.remove('hidden');
            const loaderMsg = document.getElementById('loader-msg');

            try {
                let media = [];
                if (selectedFilesArray.length > 0) {
                    loaderMsg.innerText = "Uploading media securely...";
                    media = await Promise.all(selectedFilesArray.map(f => uploadToCloudinary(f)));
                }

                loaderMsg.innerText = "Saving post...";
                
                const finalName = userData?.fullName || userData?.facilityName || "Member";
                const finalPic = userData?.profilePicUrl || "";

                const postData = {
                    type: "general_post", 
                    title: title, 
                    desc: desc, 
                    externalLink: link,
                    posterId: currentUser.uid, 
                    posterName: finalName,
                    posterPic: finalPic, 
                    location: userData?.city || "Pakistan", 
                    media: media, 
                    likes: [],
                    commentsCount: 0,
                    createdAt: serverTimestamp()
                };

                const docRef = await addDoc(collection(db, "posts"), postData);

                // Notification Backend
                try {
                    fetch('https://notication-healthjobs.vercel.app/api/server', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            title: title || finalName, 
                            body: desc || "Check new medical update!", 
                            postId: docRef.id,
                            type: "general_post"
                        })
                    });
                } catch(e) { console.log("Notification backend failed"); }

                // Telegram Auto Post
                try {
                    await fetch("https://healthjobs-telegram-bot.vercel.app/api/send-alert", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            title: "📢 UPDATE by " + finalName,
                            location: (title ? title : (desc ? desc.substring(0, 40) + "..." : "View update details")),
                            link: "https://healthjobs-portal.web.app"
                        })
                    });
                } catch(e) { console.log("Telegram alert failed"); }

                // Live Search Index Sync
                await set(ref(dbRT, 'search_index/' + docRef.id), {
                    id: docRef.id, 
                    t: title || desc.substring(0, 30), 
                    p: finalName, 
                    pic: finalPic,
                    loc: userData?.city || "Pakistan",
                    type: "general_post"
                });

                document.getElementById('upload-loader').classList.add('hidden');
                alert("Published Successfully!");
                window.location.href = "index.html";
                
            } catch (err) {
                alert("Upload Error: " + err.message);
                document.getElementById('upload-loader').classList.add('hidden');
            }
        };
    </script>
</body>
</html>
